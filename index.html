/* ══════════════════════════════════════════════
   SUMMON — full bleed
   ══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --film:#0A0A09;
  --white:#F6F4EF;
  --dim:rgba(246,244,239,.56);
  --faint:rgba(246,244,239,.30);
  --ghost:rgba(246,244,239,.14);
  --hair:rgba(246,244,239,.20);
  --chip:rgba(246,244,239,.14);
  --accent:#E50914;
  --accent-soft:rgba(229,9,20,.16);
  --accent-glow:rgba(229,9,20,.42);
  --serif:'Instrument Serif',Georgia,serif;
  --display:'Fraunces','Instrument Serif',Georgia,serif;
  --mono:'DM Mono',ui-monospace,Menlo,monospace;
  --pad:clamp(18px,2.6vw,42px);
  --label:clamp(9px,.72vw,11px);
  --deck-h:196px;
}

html,body{height:100%;background:var(--film);color:var(--white);font-family:var(--mono);overflow:hidden}
button,textarea{font:inherit;color:inherit;background:none;border:0}
button{cursor:pointer}
::selection{background:var(--white);color:var(--film)}
:focus-visible{outline:1px solid var(--white);outline-offset:4px}
#query:focus,#query:focus-visible,#revealQuery:focus,#revealQuery:focus-visible{outline:none}

.lbl{font-family:var(--mono);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
.lbl b{color:var(--white);font-weight:400}

.plate{position:fixed;inset:0;display:none}
.plate.on{display:block}

/* ─────── lockup ─────── */
.mark{display:inline-flex;align-items:center;text-align:left;line-height:1}
.mark-word{font-family:var(--serif);font-weight:400;font-size:30px;line-height:.86;letter-spacing:.045em;text-transform:uppercase;color:var(--white);-webkit-text-stroke:.45px currentColor;text-shadow:0 0 .01px currentColor}
button.mark:hover .mark-word{opacity:.7}
button.mark{cursor:pointer}

/* ─────── shared image bed ─────── */
.canvas{position:absolute;inset:0;overflow:hidden;background:var(--film)}
.canvas img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;
  opacity:0;transition:opacity 1.4s ease;animation:drift 34s ease-in-out infinite alternate;
}
.canvas img.on{opacity:1}
@keyframes drift{from{transform:scale(1.02)}to{transform:scale(1.09) translate3d(-1%,.6%,0)}}
.canvas::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(10,10,9,.66) 0%,rgba(10,10,9,.06) 22%,rgba(10,10,9,.20) 48%,rgba(10,10,9,.94) 100%),
    linear-gradient(90deg,rgba(10,10,9,.72) 0%,rgba(10,10,9,.10) 48%,rgba(10,10,9,.30) 100%);
}

.corner{position:absolute;z-index:8;display:flex;align-items:center;gap:16px}
/* ─── landing: let the film pop. protect only the corner the type sits in ─── */
#landing .canvas img{filter:saturate(1.06)}
#landing .canvas::after{
  background:
    linear-gradient(180deg,rgba(10,10,9,.24) 0%,rgba(10,10,9,0) 28%,rgba(10,10,9,0) 56%,rgba(10,10,9,.88) 100%),
    linear-gradient(90deg,rgba(10,10,9,.7) 0%,rgba(10,10,9,.16) 32%,rgba(10,10,9,0) 58%);
}
.tl{top:var(--pad);left:var(--pad)}
.tr{top:var(--pad);right:var(--pad)}
.br{bottom:var(--pad);right:var(--pad)}

.status-corner{display:flex;align-items:center;gap:8px}
.status-loader{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--white);
  opacity:.32;
  animation:statusPulse 1.05s ease-in-out infinite;
  flex:0 0 auto;
}
.status-loader.off{display:none}
@keyframes statusPulse{
  0%,100%{opacity:.18;transform:scale(.82)}
  50%{opacity:.95;transform:scale(1)}
}

/* ═══════ OPENING FIELD — cinematic loading gate ═══════ */
#opening{display:block;background:var(--film);z-index:40}
#opening:not(.on){display:none}
#opening .canvas img{filter:saturate(1.04) contrast(1.03);transition:opacity 1.2s ease}
#opening .canvas::after{
  background:
    linear-gradient(180deg,rgba(10,10,9,.48) 0%,rgba(10,10,9,.06) 28%,rgba(10,10,9,.16) 58%,rgba(10,10,9,.9) 100%),
    radial-gradient(130% 110% at 50% 42%,rgba(10,10,9,0) 34%,rgba(10,10,9,.58) 100%);
}
.opening-word{
  position:absolute;z-index:6;left:50%;top:50%;transform:translate(-50%,-54%);
  font-family:var(--serif);font-size:clamp(72px,13vw,220px);font-weight:400;line-height:.8;
  letter-spacing:.045em;text-transform:uppercase;color:var(--white);
  -webkit-text-stroke:.7px currentColor;text-shadow:0 2px 28px rgba(0,0,0,.34);
  user-select:none;
  will-change:transform,opacity;
}

.opening-thought{
  position:absolute;z-index:7;
  left:50%;top:calc(50% + clamp(64px,8.5vw,138px));
  width:min(78vw,980px);
  transform:translateX(-50%);
  text-align:center;
  color:rgba(246,244,239,.96);
  font-family:var(--sans);
  font-size:clamp(15px,1.45vw,24px);
  line-height:1.3;
  letter-spacing:-.015em;
  text-wrap:balance;
  text-shadow:0 2px 22px rgba(0,0,0,.56);
  opacity:0;
  transition:opacity .72s cubic-bezier(.22,.8,.22,1),transform .72s cubic-bezier(.22,.8,.22,1);
  pointer-events:none;
}
.opening-thought.on{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.opening-thought.out{
  opacity:0;
  transform:translateX(-50%) translateY(3px);
}
.opening-status{
  position:absolute;z-index:7;left:var(--pad);right:var(--pad);bottom:var(--pad);
  display:grid;gap:12px;
  transition:opacity .34s ease,transform .34s ease;
}
.opening-meta{display:flex;justify-content:space-between;align-items:center;gap:16px}
.opening-meta .lbl{color:rgba(246,244,239,.86)}
.opening-count{white-space:nowrap;text-align:right}
.opening-track{
  position:relative;height:4px;
  background:rgba(246,244,239,.18);
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.16);
}
.opening-fill{
  width:0;height:100%;
  background:var(--white);
  box-shadow:0 0 18px rgba(246,244,239,.42);
  will-change:width;
}
#opening.transitioning .opening-status{opacity:0;transform:translateY(8px)}
#opening.transitioning .opening-thought{opacity:0;transform:translateX(-50%) translateY(6px)}
#opening.leaving{animation:openingLeave .9s cubic-bezier(.22,.8,.22,1) forwards}
@keyframes openingLeave{
  0%{opacity:1}
  52%{opacity:1}
  100%{opacity:0}
}
.opening-word-flight{
  position:fixed;z-index:100;left:0;top:0;
  font-family:var(--serif);font-weight:400;line-height:.8;
  letter-spacing:.045em;text-transform:uppercase;color:var(--white);
  -webkit-text-stroke:.7px currentColor;
  text-shadow:0 2px 28px rgba(0,0,0,.34);
  white-space:nowrap;pointer-events:none;user-select:none;
  transform-origin:top left;will-change:transform;
}
body.opening-morph #landingHome{visibility:hidden}


/* ═══════ LANDING ═══════ */
#landing .head{position:absolute;z-index:6;left:var(--pad);bottom:calc(var(--pad) + 66px);top:auto;width:min(62vw,900px);height:clamp(300px,44vh,430px)}
.title{position:absolute;left:0;bottom:clamp(155px,18vh,185px);font-family:var(--serif);font-size:clamp(52px,7vw,124px);line-height:.86;letter-spacing:-.025em}
.title i{font-style:italic}
#searchForm{position:absolute;left:0;right:0;bottom:24px}
#landing .formats{position:absolute;left:0;bottom:0;margin-top:0}

.line{margin-top:0;display:flex;align-items:flex-end;gap:14px;border-bottom:1px solid var(--white);padding-bottom:10px}
#query{flex:1;min-width:0;resize:none;overflow:hidden;font-family:var(--serif);font-size:clamp(22px,2.4vw,38px);line-height:1.1;min-height:1.1em;max-height:8.8em;caret-color:var(--white);transition:height .18s ease}
#query::placeholder{color:var(--white);opacity:1}
.icon{width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;border:1px solid var(--hair);color:var(--dim)}
.icon:hover{color:var(--white);border-color:var(--white)}
.icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.icon.listening{background:var(--white);color:var(--film);border-color:var(--white)}
.send{width:38px;height:38px;flex:0 0 auto;background:var(--white);color:var(--film);border:0;display:grid;place-items:center;font-size:16px}
.send:hover{background:var(--dim)}

.credits{position:absolute;z-index:6;right:var(--pad);top:50%;translate:0 -50%;text-align:right;max-width:24vw}
.credits .stack{font-family:var(--serif);font-size:clamp(17px,1.35vw,24px);line-height:1.3}
.credits .stack span{display:block}
.subhint{margin-top:18px;font-family:var(--mono);font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.formats{margin-top:10px;font-family:var(--mono);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}



/* ═══ PROOF — full-bleed film, the summon overlaid, the score. that's all. ═══ */
@media (max-width:720px){
  #landing .head{width:auto;left:var(--pad);right:var(--pad)}
}

.rail{position:absolute;z-index:6;left:var(--pad);bottom:var(--pad);right:calc(var(--pad) + 210px);display:flex;flex-wrap:wrap;align-items:center;gap:2px}
.rail .rail-lbl{margin-right:10px;white-space:nowrap}
.rail button{padding:8px 11px;font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.rail button:hover{color:var(--white)}
.rail button.on{background:var(--chip);color:var(--white)}
45%{transform:scaleX(1);transform-origin:left}55%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}

/* ═══════ LEADER — reading the field ═══════ */
#leader{background:var(--film)}
#leader .canvas img{filter:brightness(.62) contrast(1.03) saturate(.96)}
#leader .canvas img.on{opacity:1}
#leader .canvas::after{
  background:
    radial-gradient(135% 130% at 50% 36%, rgba(10,10,9,0) 44%, rgba(10,10,9,.74) 100%),
    linear-gradient(180deg, rgba(10,10,9,.5) 0%, rgba(10,10,9,0) 24%, rgba(10,10,9,0) 60%, rgba(10,10,9,.94) 100%);
}

/* the field, passing: real candidate titles, read at speed */
.field{position:absolute;inset:0;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:0;overflow:hidden;
  mask-image:linear-gradient(180deg,transparent,#000 18%,#000 82%,transparent);
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 18%,#000 82%,transparent);
  transition:opacity .6s ease,filter .6s ease;
}
.field-col{overflow:hidden;position:relative}
.field-col .run{position:absolute;left:0;right:0;top:0;display:grid;gap:16px;padding:0 clamp(10px,1.6vw,26px);will-change:transform}
.field-col:nth-child(1) .run{animation:runUp 34s linear infinite}
.field-col:nth-child(2) .run{animation:runUp 26s linear infinite;opacity:.7}
.field-col:nth-child(3) .run{animation:runUp 42s linear infinite;opacity:.5}
@keyframes runUp{from{transform:translateY(0)}to{transform:translateY(-50%)}}
.field-col span{
  display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ghost);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.field-col:nth-child(2){text-align:center}
.field-col:nth-child(3){text-align:right}
body.locked .field{opacity:0;filter:blur(6px)}

/* the answer, arriving through a gate */
.resolve{
  position:absolute;inset:0;z-index:3;width:100%;height:100%;object-fit:cover;object-position:center 28%;
  opacity:0;clip-path:inset(50% 0 50% 0);
}
body.locked .resolve{animation:openGate 1.6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes openGate{
  0%{opacity:0;clip-path:inset(50% 0 50% 0);filter:brightness(.28) contrast(1.4) blur(12px)}
  28%{opacity:1;filter:brightness(.6) contrast(1.1) blur(6px)}
  100%{opacity:1;clip-path:inset(0 0 0 0);filter:none}
}
body.launch #leader{animation:fadeOut .5s ease forwards}
@keyframes fadeOut{to{opacity:0}}
#reveal.on{animation:revealIn .48s ease both}
@keyframes revealIn{from{opacity:0}to{opacity:1}}

.work{position:absolute;z-index:6;left:var(--pad);right:var(--pad);top:50%;translate:0 -50%;text-align:center;pointer-events:none}
.work .qt{
  font-family:var(--serif);font-size:clamp(30px,4.4vw,80px);line-height:.94;letter-spacing:-.025em;
  max-width:20ch;margin:16px auto 0;text-wrap:balance;
  text-shadow:none;
}
body.locked .work{opacity:0;transform:translate(0,-54%);transition:opacity .6s ease,transform .6s ease}

/* the answer's name, landing where the query stood */
.verdict{position:absolute;z-index:7;left:var(--pad);bottom:calc(var(--pad) + 44px);opacity:0}
.verdict .n{font-family:var(--serif);font-size:clamp(30px,4vw,66px);line-height:.9;letter-spacing:-.02em}
.verdict #verdictLbl b{color:var(--accent)}
body.locked .verdict{animation:verdictIn .8s .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes verdictIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.state{position:absolute;z-index:7;left:var(--pad);right:var(--pad);bottom:var(--pad);display:flex;justify-content:space-between;gap:20px;align-items:baseline}
.elapsed{font-variant-numeric:tabular-nums}
.shuttle{position:absolute;z-index:7;left:var(--pad);right:var(--pad);bottom:calc(var(--pad) + 26px);height:1px;background:var(--hair);overflow:hidden}
.shuttle::after{content:'';position:absolute;top:0;bottom:0;left:0;width:20%;background:var(--accent);animation:shuttle 2.1s cubic-bezier(.65,0,.35,1) infinite}
@keyframes shuttle{from{left:-20%}to{left:100%}}
body.locked .shuttle::after{animation:none;left:0;width:100%;transition:width .5s ease}

/* ═══════ REVEAL — cinematic, in colour ═══════ */
#reveal{background:var(--film)}
#revealCanvas{position:absolute;inset:0;overflow:hidden;background:#0d0d0c}
#revealCanvas img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 24%}
#stillBg{opacity:0}
#still{opacity:1;filter:saturate(1.06) contrast(1.03)}
#revealCanvas::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(8,8,7,.62) 0%,rgba(8,8,7,.10) 26%,rgba(8,8,7,.34) 56%,rgba(8,8,7,.97) 100%),
    linear-gradient(90deg,rgba(8,8,7,.70) 0%,rgba(8,8,7,.03) 52%,rgba(8,8,7,.40) 100%);
}
/* square / no-backdrop art → blurred colour bed + card */
#revealCanvas.square #still{opacity:0}
#revealCanvas.square #stillBg{opacity:1;filter:blur(70px) brightness(.5) saturate(1.15);transform:scale(1.35)}
#revealCanvas.square ~ #revealFrame #card{display:block}

#revealFrame{position:absolute;inset:0;z-index:6;display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:var(--pad);gap:20px}

.bar{display:grid;grid-template-columns:1fr minmax(280px,44vw) 1fr;align-items:center;gap:24px}
.bar .nav{justify-self:end}
.summon-bar{min-width:0}
.summon-bar .lbl{display:block;margin-bottom:6px;color:var(--accent);letter-spacing:.24em}
.summon-bar form{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--hair);padding-bottom:7px}
.summon-bar form:focus-within{border-color:var(--accent)}
#revealQuery{flex:1;min-width:0;resize:none;overflow:hidden;height:1.35em;font-family:var(--serif);font-size:18px;line-height:1.35}
#revealQuery::placeholder{color:var(--faint)}
.summon-bar .icon,.summon-bar .send{width:30px;height:30px}
.summon-bar .send{background:var(--accent);color:#fff}
.summon-bar .send:hover{background:#ff1a25}
.summon-bar .icon svg{width:14px;height:14px}

.nav{display:flex;align-items:center;gap:12px}
.nav .pos{font-size:var(--label);letter-spacing:.2em;color:var(--dim);font-variant-numeric:tabular-nums}
.nav .pos b{color:var(--accent);font-weight:400}
.nav .arrow{width:34px;height:34px;display:grid;place-items:center;border:1px solid var(--hair);font-size:14px}
.nav .arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.stage{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:32px;min-height:0}
.info{max-width:min(60ch,54vw);min-width:0}
.eyebrow{display:block;margin-bottom:14px}
.eyebrow b{color:var(--white)}
#score{color:var(--accent)}
#title{font-family:var(--serif);font-size:clamp(40px,5.2vw,92px);line-height:.88;letter-spacing:-.03em;overflow-wrap:break-word;text-shadow:0 4px 44px rgba(0,0,0,.62)}
.meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:4px 0}
.meta span{font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.meta span:not(:last-child)::after{content:'/';margin:0 10px;color:var(--faint)}
.synopsis{margin-top:18px;max-width:54ch;font-family:var(--serif);font-size:clamp(16px,1.35vw,22px);line-height:1.42;color:var(--white);opacity:.84;text-shadow:0 2px 34px rgba(0,0,0,.7)}
.synopsis:empty{display:none}
.actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}
.actions button{padding:11px 15px;border:1px solid var(--hair);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--white)}
.actions button:hover{border-color:var(--white)}
.actions button.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
.actions button.solid:hover{background:#ff1a25;box-shadow:0 0 24px var(--accent-glow)}
.actions button[disabled]{opacity:.32;pointer-events:none}

/* square cover art becomes a card */
#card{display:none;align-self:end;width:clamp(190px,21vw,300px);aspect-ratio:1;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);border:1px solid var(--hair)}
#card img{width:100%;height:100%;object-fit:cover;display:block}

/* deck */
.deck{align-self:end}
.deck-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.deck-strip{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;scrollbar-width:none;padding-bottom:8px;min-width:0;max-width:100%;touch-action:pan-x;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.deck-strip::-webkit-scrollbar{display:none}
.tile{flex:0 0 auto;width:clamp(74px,5.8vw,96px);text-align:left;opacity:.5;transition:opacity .2s ease}
.tile:hover{opacity:.85}
.tile.on{opacity:1}
.tile .shot{position:relative;display:block;width:100%;aspect-ratio:2/3;overflow:hidden;background:#141412;border:1px solid transparent}
.tile.on .shot{border-color:var(--accent)}
.tile .shot img{width:100%;height:100%;object-fit:cover;filter:saturate(1.02)}
.tile .n{position:absolute;left:0;top:0;background:rgba(10,10,9,.76);padding:3px 5px;font-size:9px;letter-spacing:.08em}
.tile.on .n{background:var(--accent);color:#fff}
.tile .cap{display:block;margin-top:7px;font-size:9px;line-height:1.3;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile.on .cap{color:var(--white)}
.tile .sc{display:block;margin-top:3px;font-size:9px;color:var(--dim);font-variant-numeric:tabular-nums}
.tile.on .sc{color:var(--accent)}

/* projector */
#projector{position:fixed;inset:0;z-index:900;display:none;background:#000}
body.playing{overflow:hidden}
body.playing #projector{display:block}
#projFrame{position:absolute;inset:0;width:100%;height:100%;border:0}
.pbtn{position:fixed;z-index:920;display:grid;place-items:center;width:44px;height:44px;color:#fff;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.22);opacity:0;transition:opacity .2s}
#projector.show .pbtn{opacity:1}
#projClose{top:16px;right:16px;font-size:20px}
#projPrev{left:16px;top:50%;translate:0 -50%}
#projNext{right:16px;top:50%;translate:0 -50%}
#projQ{position:fixed;z-index:915;top:22px;left:50%;translate:-50% 0;max-width:56vw;font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.toast{position:fixed;left:50%;bottom:26px;translate:-50% 0;z-index:999;background:var(--white);color:var(--film);font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:11px 15px}

/* ─────── responsive ─────── */
@media(max-width:1000px){
  :root{--pad:16px}
  .credits{top:auto;bottom:calc(var(--pad) + 186px);translate:0;max-width:46vw}
  .credits .stack{font-size:16px}
  #landing .head{width:auto;right:var(--pad);bottom:calc(var(--pad) + 54px);top:auto;height:clamp(260px,44vh,360px)}
  .title{bottom:clamp(135px,18vh,165px);font-size:clamp(38px,10.5vw,64px)}
  .rail{right:var(--pad);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  #landing .br{bottom:auto;top:var(--pad);right:var(--pad)}
  .field{grid-template-columns:1fr}
  .field-col:nth-child(n+2){display:none}
  .field-col span{text-align:center}
  .work .qt{font-size:clamp(26px,8vw,44px)}
  #revealFrame{gap:14px;grid-template-rows:auto auto auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom))}
  #reveal{overflow:hidden}
  .bar{grid-template-columns:auto 1fr;grid-template-areas:'mark nav' 'q q';row-gap:12px}
  .bar>.mark{grid-area:mark}
  .bar>.nav{grid-area:nav}
  .summon-bar{grid-area:q}
  .stage{grid-template-columns:1fr;align-items:end;gap:16px}
  #card{width:min(38vw,150px);justify-self:end;order:-1}
  #title{font-size:clamp(34px,10vw,56px)}
  .meta span:nth-child(n+4){display:none}
  .deck{width:100%;min-width:0;padding-bottom:4px}
  .deck-head{position:relative;z-index:2;margin-bottom:10px}
  .deck-strip{width:100%;padding-right:42px;scroll-snap-type:x proximity}
  .tile{width:74px;scroll-snap-align:start}
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition-duration:.01ms !important}}
/* ── mobile landing: stop the top-right + credits overlap ── */
@media(max-width:1000px){
  .credits{display:none}
  #landing .corner.br{display:none}
  .corner.tr{right:var(--pad);left:auto}
  #landing .head{left:var(--pad);right:var(--pad);width:auto;bottom:calc(var(--pad) + 30px);top:auto;height:clamp(250px,48vh,340px)}
  .title{bottom:clamp(125px,18vh,155px);font-size:clamp(32px,8.6vw,56px)}
  .line{gap:10px}
  .subhint{margin-top:14px}
}
@media(max-width:480px){
  .mark-word{font-size:26px;-webkit-text-stroke:.38px currentColor}
  #landing .head{height:clamp(240px,50vh,330px)}
  .title{bottom:clamp(118px,18vh,148px)}
  #query{font-size:clamp(20px,6.2vw,30px)}
  .synopsis{-webkit-line-clamp:4;max-height:5.7em}
}


@media(max-width:1000px){
  .bar{align-items:start}
  .nav{gap:8px;align-self:start}
  .nav .pos{font-size:9px;letter-spacing:.14em}
  .nav .arrow{width:30px;height:30px;font-size:12px}
  .summon-bar .lbl{margin-bottom:4px}
  .summon-bar form{gap:8px;align-items:flex-end;padding-bottom:8px}
  #revealQuery{font-size:clamp(16px,4.7vw,21px);line-height:1.22;min-height:1.22em;max-height:3.9em}
  .stage{gap:14px}
  .synopsis{max-width:34ch;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:5;overflow:hidden;max-height:7.1em}
  .actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:18px;margin-bottom:14px}
  .actions button{width:100%;min-height:46px;display:flex;align-items:center;justify-content:center}
  .deck{margin-top:10px}
  .deck-head{margin-bottom:10px}
  .deck-strip{padding-right:16px;padding-bottom:6px}
}
@media(max-width:700px){
  #card{display:none !important}
}
@media(max-width:480px){
  .bar{row-gap:10px}
  #revealQuery{font-size:15px;line-height:1.2;max-height:4.2em}
  .summon-bar .icon,.summon-bar .send{width:34px;height:34px}
  .nav .arrow{width:32px;height:32px}
}


@media(max-width:1000px){
  #revealFrame{
    display:flex;
    flex-direction:column;
    gap:14px;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
    padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom));
  }
  .bar{flex:0 0 auto}
  .stage{
    display:block;
    flex:0 0 auto;
    min-height:auto;
    overflow:visible;
  }
  .info{
    width:100%;
    max-width:none;
  }
  .actions{
    margin-top:18px;
    margin-bottom:0;
  }
  .deck{
    flex:0 0 auto;
    width:100%;
    min-width:0;
    margin-top:22px;
    padding-bottom:4px;
    position:relative;
    z-index:1;
  }
  .deck-head{
    position:static;
    z-index:auto;
    margin-bottom:10px;
  }
}

@media (max-width:720px){
  .opening-word{font-size:clamp(58px,21vw,108px);top:47%}
  .opening-thought{
    top:calc(47% + clamp(52px,17vw,86px));
    width:min(88vw,620px);
    font-size:clamp(14px,4vw,18px);
    line-height:1.32;
  }
  .opening-meta{align-items:flex-end}
}



/* ═══════ LIVE RESONANCE — the field answers while the thought is still forming ═══════ */
#revealCanvas,
#reveal .stage,
#reveal .deck-strip{
  will-change:opacity,transform,filter;
}
#reveal.live-swap #revealCanvas{
  animation:liveCanvasResolve .48s cubic-bezier(.22,.8,.22,1) both;
}
#reveal.live-swap .stage{
  animation:liveStageResolve .34s cubic-bezier(.22,.8,.22,1) both;
}
#reveal.live-swap .deck-strip{
  animation:liveDeckResolve .42s cubic-bezier(.22,.8,.22,1) both;
}
@keyframes liveCanvasResolve{
  from{opacity:.76;filter:saturate(.9) brightness(.9)}
  to{opacity:1;filter:none}
}
@keyframes liveStageResolve{
  from{opacity:.72;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes liveDeckResolve{
  from{opacity:.72;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}
@media(prefers-reduced-motion:reduce){
  #reveal.live-swap #revealCanvas,
  #reveal.live-swap .stage,
  #reveal.live-swap .deck-strip{animation:none!important}
}


/* ═══════ CINEMATIC THOUGHT SURFACE ═══════
   No search box. No categories. The thought itself is the interface.
   The ranked field remains clear and docked beneath the winner. */

/* Landing: keep the field visible, remove conventional search chrome. */
#landing{cursor:text}
#landing .title,
#landing .formats{display:none!important}
#landing .head{
  left:50%!important;
  right:auto!important;
  top:auto!important;
  bottom:clamp(96px,18vh,220px)!important;
  width:min(82vw,1180px)!important;
  height:auto!important;
  transform:translateX(-50%);
}
#landing #searchForm{
  position:relative!important;
  inset:auto!important;
  width:100%;
}
#landing .line{
  position:relative;
  margin:0!important;
  padding:0!important;
  border:0!important;
  gap:0!important;
  align-items:flex-start!important;
}
#landing #query{
  width:100%;
  min-height:1.08em;
  max-height:5.5em;
  padding:0!important;
  border:0!important;
  background:transparent!important;
  font-family:var(--serif);
  font-size:clamp(34px,5.4vw,88px)!important;
  line-height:.98!important;
  letter-spacing:-.025em;
  color:var(--white);
  caret-color:var(--white);
  text-shadow:0 3px 34px rgba(0,0,0,.72);
}
#landing #query::placeholder{
  color:rgba(246,244,239,.96)!important;
  opacity:1!important;
}
#landing .icon,
#landing .send{display:none!important}

/* Quietly charged, not sterile: preserve the moving field and protect the thought. */
#landing .canvas::after{
  background:
    radial-gradient(90% 44% at 50% 74%,rgba(10,10,9,.04) 0%,rgba(10,10,9,.34) 56%,rgba(10,10,9,.72) 100%),
    linear-gradient(180deg,rgba(10,10,9,.22) 0%,rgba(10,10,9,0) 32%,rgba(10,10,9,.12) 55%,rgba(10,10,9,.90) 100%)!important;
}

/* Reveal: the thought floats. No underline, no box, no search controls. */
#reveal .bar{
  grid-template-columns:1fr minmax(320px,50vw) 1fr;
  align-items:start;
}
#reveal .summon-bar .lbl{display:none!important}
#reveal .summon-bar form{
  border:0!important;
  padding:0!important;
  gap:0!important;
  align-items:flex-start!important;
}
#reveal #revealQuery{
  width:100%;
  height:auto;
  min-height:1.06em;
  max-height:4.1em;
  padding:0!important;
  border:0!important;
  background:transparent!important;
  font-family:var(--serif);
  font-size:clamp(22px,2.55vw,42px)!important;
  line-height:1.03!important;
  letter-spacing:-.018em;
  color:var(--white);
  caret-color:var(--white);
  text-shadow:0 2px 28px rgba(0,0,0,.72);
}
#reveal .summon-bar .icon,
#reveal .summon-bar .send{display:none!important}

/* The alternatives stay exactly as the existing clear, docked ranked field. */
#reveal .deck{
  align-self:end;
  position:relative;
  z-index:8;
}

/* The winning result remains the visual focus without suppressing the field. */
#reveal .stage{position:relative;z-index:7}

@media(max-width:1000px){
  #landing .head{
    left:var(--pad)!important;
    right:var(--pad)!important;
    bottom:clamp(92px,16vh,150px)!important;
    width:auto!important;
    transform:none!important;
  }
  #landing #query{
    font-size:clamp(34px,9vw,64px)!important;
    max-height:5.8em;
  }
  #reveal .bar{
    grid-template-columns:auto 1fr!important;
    grid-template-areas:'mark nav' 'q q'!important;
    row-gap:18px!important;
  }
  #reveal .summon-bar{grid-area:q!important}
  #reveal #revealQuery{font-size:clamp(24px,6vw,38px)!important}
}

@media(max-width:560px){
  #landing .head{bottom:clamp(84px,15vh,124px)!important}
  #landing #query{font-size:clamp(30px,10.5vw,50px)!important;line-height:1.02!important}
  #reveal #revealQuery{font-size:clamp(22px,7vw,32px)!important}
}



/* ═══════ REVEAL HEADER — no black bar ═══════
   Keep the thought and controls floating directly on the cinematic image. */
#reveal .bar{
  background:transparent!important;
  box-shadow:none!important;
  border:0!important;
  backdrop-filter:none!important;
  -webkit-backdrop-filter:none!important;
}
#reveal .bar::before,
#reveal .bar::after{display:none!important;content:none!important}

/* Remove the dark top-band treatment that made the reveal header read as a black menu bar. */
#revealCanvas::after{
  background:
    linear-gradient(180deg,
      rgba(8,8,7,.04) 0%,
      rgba(8,8,7,0) 30%,
      rgba(8,8,7,.18) 58%,
      rgba(8,8,7,.96) 100%),
    linear-gradient(90deg,
      rgba(8,8,7,.48) 0%,
      rgba(8,8,7,.02) 52%,
      rgba(8,8,7,.24) 100%)!important;
}

#reveal .mark-word,
#reveal #revealQuery,
#reveal .nav{
  text-shadow:0 2px 28px rgba(0,0,0,.78);
}

<!-- ═════════ OPENING FIELD ═════════ -->
<section class="plate on" id="opening" aria-live="polite">
  <div class="canvas"><img id="openingCoverA" alt=""><img id="openingCoverB" alt=""></div>
  <div class="opening-word" id="openingWord">Summon</div>
  <div class="opening-thought" id="openingThought" aria-live="polite"></div>
  <div class="opening-status">
    <div class="opening-meta">
      <span class="lbl" id="openingLabel">loading field</span>
      <span class="lbl opening-count" id="openingCount">opening</span>

    <div class="opening-track" aria-hidden="true"><div class="opening-fill" id="openingFill"></div></div>
  </div>
</section>

<!-- ═════════ LANDING ═════════ -->
<section class="plate" id="landing">

  </div>

<!-- ═════════ LEADER ═════════ -->
<section class="plate" id="leader" aria-hidden="true">

  </div>

    <span class="lbl" id="workLabel">summoning</span>

  </div>

  <div class="state">

    <span class="lbl elapsed" id="elapsed">0.0s</span>
  </div>
</section>

<!-- ═════════ REVEAL ═════════ -->
<section class="plate" id="reveal">
  <div class="canvas" id="revealCanvas"><img id="stillBg" class="on" alt="" aria-hidden="true"><img id="still" class="on" alt=""></div>

  <div id="revealFrame">
    <header class="bar">
      <button class="mark" id="home" type="button" aria-label="New summon">
        <span class="mark-word">Summon</span>
      </button>

      <div class="summon-bar">
        <span class="lbl">summon</span>
        <form id="revealForm">
          <textarea id="revealQuery" rows="1" spellcheck="false" placeholder="reshape your summon…"></textarea>
          <button type="button" class="icon" id="revealVoiceBtn" aria-label="Dictate">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14.25c1.85 0 3.2-1.35 3.2-3.2V6.2C15.2 4.35 13.85 3 12 3S8.8 4.35 8.8 6.2v4.85c0 1.85 1.35 3.2 3.2 3.2Z"/><path d="M5.75 10.5c0 3.55 2.55 6.05 6.25 6.05s6.25-2.5 6.25-6.05"/><path d="M12 16.55V21"/><path d="M8.6 21h6.8"/></svg>
          </button>
          <button type="submit" class="send" aria-label="Run summon">→</button>
        </form>
      </div>

      <div class="nav">
        <span class="pos"><b id="pos">01</b> / <span id="total">10</span></span>
        <button class="arrow" id="prev" type="button" aria-label="Previous match">←</button>

    </header>

    <div class="stage">
      <div class="info">

      </div>
      <figure id="card"><img id="cardImg" alt=""></figure>
    </div>

    <div class="deck">
      <div class="deck-head">
        <span class="lbl">ranked resonance field</span>
        <span class="lbl" id="deckCount"></span>
      </div>
      <div class="deck-strip" id="deck"></div>
    </div>
  </div>
</section>

<!-- ═════════ PROJECTOR ═════════ -->
<div id="projector" aria-hidden="true">
  <iframe id="projFrame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen aria-label="Trailer"></iframe>

const busy=()=>{const q=$('#query');return document.activeElement===q||!!q.value};
let placeholderMirror=null;
function resizeForPlaceholder(el,text=''){
  if(!el)return;
  if(!placeholderMirror){
    placeholderMirror=document.createElement('div');
    placeholderMirror.setAttribute('aria-hidden','true');
    placeholderMirror.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;';
    document.body.appendChild(placeholderMirror);
  }
  const cs=getComputedStyle(el);
  Object.assign(placeholderMirror.style,{
    width:el.clientWidth+'px',
    font:cs.font,
    fontFamily:cs.fontFamily,
    fontSize:cs.fontSize,
    fontWeight:cs.fontWeight,
    fontStyle:cs.fontStyle,
    letterSpacing:cs.letterSpacing,
    lineHeight:cs.lineHeight,
    padding:cs.padding,
    border:cs.border,
    boxSizing:cs.boxSizing
  });
  placeholderMirror.textContent=text||' ';
  const min=parseFloat(cs.minHeight)||0;
  const max=parseFloat(cs.maxHeight)||Infinity;
  const h=Math.max(min,Math.min(max,placeholderMirror.scrollHeight+2));
  el.style.height=h+'px';
}
function resetPlaceholderHeight(el){
  if(!el)return;
  el.style.height='';
}
function typePlaceholder(el,text){
  return new Promise(res=>{
    let i=0;
    (function step(){
      if(busy()){
        el.setAttribute('placeholder','');
        resetPlaceholderHeight(el);
        return res();
      }
      if(i>text.length)return res();
      const shown=text.slice(0,i)+'▏';
      el.setAttribute('placeholder',shown);
      resizeForPlaceholder(el,shown);
      const c=text[i-1]||'';
      let d=30+Math.random()*40;
      if(',.'.includes(c))d+=240; else if(c===' ')d+=14;
      i++;setTimeout(step,d);
    })();
  });
}

let rollI=0,rollRun=false,rollGeneration=0;
async function rollCycle(generation){
  const q=$('#query');
  while(rollRun&&generation===rollGeneration){
    try{
      if(busy()){
        q.setAttribute('placeholder','');
        resetPlaceholderHeight(q);
        await pause(700);
        continue;
      }
      await typePlaceholder(q,ROLL[rollI]);
      if(!rollRun||generation!==rollGeneration)break;
      if(!busy()){
        q.setAttribute('placeholder',ROLL[rollI]);
        resizeForPlaceholder(q,ROLL[rollI]);
      }
      await pause(2600);
      if(!rollRun||generation!==rollGeneration)break;
      if(!$('#landing').classList.contains('on')){rollRun=false;break}
      rollI=(rollI+1)%ROLL.length;
    }catch(e){
      if(!rollRun||generation!==rollGeneration)break;
      await pause(500);
    }
  }
}
function rollStop(){
  rollRun=false;
  rollGeneration++;
}
function rollStart({restart=false}={}){
  const q=$('#query');
  const landing=$('#landing');
  const opening=$('#opening');
  if(!q||!landing?.classList.contains('on')||opening?.classList.contains('on'))return;
  if(restart)rollI=0;
  if(rollRun)return;
  rollRun=true;
  const generation=++rollGeneration;
  rollCycle(generation);
}

// Backup only. Never start examples underneath the opening/loading gate.
window.addEventListener('load',()=>{
  if($('#landing')?.classList.contains('on')&&!$('#opening')?.classList.contains('on')){
    rollStart();
  }
});

const FMT_HUE={film:'#7a1226',series:'#1a2a6b',game:'#4a1a6b',book:'#6d4b2f',music:'#314f68',podcast:'#0f5a4a',short:'#7a4a10',live:'#8a1710'};

function wrap(t,max){const w=String(t||'').split(/\s+/),l=[];let c='';for(const x of w){const n=c?c+' '+x:x;if(n.length>max&&c){l.push(c);c=x}else c=n}if(c)l.push(c);return l.slice(0,4)}
function fieldArt(m,mode='poster'){
  const key=mode+(m?.type||'');
  if(artCache.has(key))return artCache.get(key);
  const land=mode==='backdrop', w=land?1600:900, h=land?900:1350;
  const hue=FMT_HUE[m?.type]||'#3a1030';
  const fs=land?60:46;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="g" x1="0" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="${hue}"/><stop offset="1" stop-color="#0A0A09"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><text x="50%" y="50%" fill="rgba(246,244,239,.15)" font-family="monospace" font-size="${fs}" letter-spacing="10" text-anchor="middle" dominant-baseline="central">${esc(fmt(m).toUpperCase())}</text></svg>`;
  const uri='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);
  artCache.set(key,uri);return uri;

function jsonp(url,ms=6500){
  return new Promise((res,rej)=>{
    const cb='__s'+Math.random().toString(36).slice(2);
    const el=document.createElement('script');
    const done=()=>{delete window[cb];el.remove()};
    window[cb]=d=>{res(d);done()};
    el.onerror=()=>{rej(new Error('jsonp'));done()};
    el.src=url+'&callback='+cb;
    document.head.appendChild(el);
    setTimeout(()=>{if(window[cb]){rej(new Error('timeout'));done()}},ms);
  });
}

const loadProgress=new Map();

let openingTargetPct=0;
let openingVisualPct=0;

let openingResolved=null;

function setFieldOpening(count){
  openingCount=Number(count)||openingCount||0;
  renderOpeningMeta();
}

function updateFieldProgress(key,loaded,total){
  loadProgress.set(key,{loaded:Math.max(0,Number(loaded)||0),total:Math.max(0,Number(total)||0)});
  recomputeOpeningTarget();
}

function recomputeOpeningTarget(){
  let loaded=0,total=0;
  for(const p of loadProgress.values()){
    total+=p.total||0;
    loaded+=Math.min(p.loaded||0,p.total||p.loaded||0);
  }
  const frac=total>0?Math.min(1,loaded/total):0;
  openingTargetPct=Math.max(openingTargetPct,5+frac*92);
  renderOpeningMeta();
  startOpeningProgressAnimation();
}

function setOpeningStage(pct,labelText){
  openingTargetPct=Math.max(openingTargetPct,Math.min(100,Number(pct)||0));
  if(labelText){const l=$('#openingLabel');if(l)l.textContent=labelText}
  startOpeningProgressAnimation();
}

function renderOpeningMeta(){
  const count=$('#openingCount');
  if(count)count.textContent=openingCount?`${openingCount.toLocaleString()} titles`:'opening';

function startOpeningProgressAnimation(){
  if(openingProgressRAF)return;
  const tick=()=>{
    openingProgressRAF=0;
    const fill=$('#openingFill');
    if(fill){
      const target=openingReady?100:Math.min(openingTargetPct,99.4);
      const gap=target-openingVisualPct;
      if(gap>0.05){
        openingVisualPct+=Math.max(0.25,gap*0.12);
        if(openingVisualPct>target)openingVisualPct=target;
      }else{
        openingVisualPct=target;
      }
      fill.style.width=Math.min(100,openingVisualPct)+'%';
    }
    if(openingReady&&openingVisualPct>=100){
      if(openingResolved){const r=openingResolved;openingResolved=null;r()}
      return;
    }
    openingProgressRAF=requestAnimationFrame(tick);
  };
  openingProgressRAF=requestAnimationFrame(tick);
}

  openingTargetPct=100;

async function required(url,kind='json',progressKey=url,expectedTotal=0,track=true){
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok)throw new Error(`${url} · ${r.status}`);

  const headerTotal=Number(r.headers.get('content-length'))||0;
  const total=expectedTotal||headerTotal;
  const report=(l,t)=>{if(track)updateFieldProgress(progressKey,l,t)};

  if(!r.body||!r.body.getReader){
    const value=kind==='buffer'?await r.arrayBuffer():await r.json();
    const size=kind==='buffer'?value.byteLength:(total||1);
    report(size,total||size);
    return value;
  }

  const reader=r.body.getReader();
  const chunks=[];
  let loaded=0;
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    chunks.push(value);
    loaded+=value.byteLength;
    report(loaded,total||loaded);
  }

  const merged=new Uint8Array(loaded);
  let off=0;
  for(const c of chunks){merged.set(c,off);off+=c.byteLength}
  report(loaded,total||loaded);

  if(kind==='buffer')return merged.buffer;
  return JSON.parse(new TextDecoder().decode(merged));
}

function refillOpeningThoughtBag(){

  }
  if(bag.length>1&&openingThoughtKey(bag[0])===openingLastThoughtKey){

  }

function openingTypingDelay(ch,baseDelay){
  let delay=baseDelay;
  if(/[.!?]/.test(ch))delay+=170;
  else if(/[,;:]/.test(ch))delay+=72;
  return delay;
}

async function typeOpeningText(el,fromText,toText,run,baseDelay){
  let current=String(fromText||'');
  const target=String(toText||'');

  // Evolution sequences normally extend the current phrase. Fall back to a
  // clean retype if a future sequence ever changes direction instead.
  if(!target.startsWith(current)){
    current='';
    el.textContent='';
  }

  for(let i=current.length;i<target.length;i++){
    if(run!==openingThoughtRun)return false;
    el.textContent=target.slice(0,i+1);
    await pause(openingTypingDelay(target[i],baseDelay));
  }
  return true;
}

function paintOpeningThought(){
  const el=$('#openingThought');
  if(!el)return;

  const next=nextOpeningThought();
  const stages=(Array.isArray(next)?next:[next]).filter(Boolean);
  if(!stages.length)return;

  const run=++openingThoughtRun;
  const hadText=Boolean(el.textContent.trim());

  // Let the previous thought fully fade before the next one begins.
  if(hadText){
    el.classList.remove('on');
    el.classList.add('out');
  }

  setTimeout(async()=>{
    if(run!==openingThoughtRun)return;

    el.textContent='';
    el.classList.remove('out');

    // A small breath between thoughts keeps the image/text rhythm cinematic.
    await pause(hadText?180:60);
    if(run!==openingThoughtRun)return;

    requestAnimationFrame(()=>el.classList.add('on'));

    if(stages.length===1){
      const text=stages[0];
      const typeWindow=4200;
      const baseDelay=Math.max(34,Math.min(62,Math.floor(typeWindow/Math.max(1,text.length))));
      await typeOpeningText(el,'',text,run,baseDelay);
      return;
    }

    // Live-resonance demo: type a thought, pause, then keep extending it.
    // The line never clears between stages, so people can literally watch the
    // meaning change in the same way the ranked field changes while typing.
    const finalText=stages[stages.length-1];
    const addedChars=stages.reduce((sum,text,i)=>{
      const prev=i?stages[i-1]:'';
      return sum+Math.max(0,text.length-(text.startsWith(prev)?prev.length:0));
    },0);
    const baseDelay=Math.max(28,Math.min(46,Math.floor(3400/Math.max(1,addedChars))));

    let current='';
    for(let i=0;i<stages.length;i++){
      const target=stages[i];
      const ok=await typeOpeningText(el,current,target,run,baseDelay);
      if(!ok||run!==openingThoughtRun)return;
      current=target;

      if(i<stages.length-1){
        await pause(i===0?520:430);
        if(run!==openingThoughtRun)return;
      }
    }

    // Keep the complete evolved thought visible until the normal cover cycle.
    el.textContent=finalText;
  },hadText?760:120);
}

  const start=source.getBoundingClientRect();
  const end=target.getBoundingClientRect();

  const flight=document.createElement('div');
  flight.className='opening-word-flight';
  flight.textContent='Summon';

  const cs=getComputedStyle(source);
  flight.style.left=`${start.left}px`;

  flight.style.fontFamily=cs.fontFamily;

  document.body.appendChild(flight);
  source.style.opacity='0';
  document.body.classList.add('opening-morph');

  const dx=end.left-start.left;
  const dy=end.top-start.top;
  const sx=end.width/start.width;
  const sy=end.height/start.height;

  const reduce=window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches;
  if(reduce){
    flight.style.transform=`translate(${dx}px,${dy}px) scale(${sx},${sy})`;
    await pause(80);
  }else if(flight.animate){
    const anim=flight.animate([
      {transform:'translate(0,0) scale(1,1)'},
      {transform:`translate(${dx}px,${dy}px) scale(${sx},${sy})`}
    ],{
      duration:920,
      easing:'cubic-bezier(.16,1,.3,1)',
      fill:'forwards'
    });
    try{await anim.finished}catch(e){}
  }else{
    flight.style.transition='transform .92s cubic-bezier(.16,1,.3,1)';
    requestAnimationFrame(()=>{
      flight.style.transform=`translate(${dx}px,${dy}px) scale(${sx},${sy})`;
    });
    await pause(960);
  }

  flight.remove();
  source.style.opacity='';
  document.body.classList.remove('opening-morph');
}

    const manifest=await required(FIELD_FILES.manifest,'json','__manifest',0,false);
    setFieldOpening(manifest.count);

    const count=Number(manifest.count)||0;
    const dim=Number(manifest.dim)||72;

    const metadataFiles=Array.isArray(manifest.metadata_files)&&manifest.metadata_files.length
      ? manifest.metadata_files
      : [manifest.metadata_file||FIELD_FILES.metadata];
    const vectorsFile=manifest.vectors_file||FIELD_FILES.vectors;
    const normsFile=manifest.norms_file||FIELD_FILES.norms;

    const vectorBytes=count*dim*4;
    const normBytes=count*4;
    const metaBudget=Math.max(1,Math.round(count*360));
    const metaPer=Math.max(1,Math.round(metaBudget/metadataFiles.length));

    updateFieldProgress('vectors',0,vectorBytes);
    updateFieldProgress('norms',0,normBytes);
    metadataFiles.forEach((f,i)=>updateFieldProgress(`metadata-${i}`,0,metaPer));

    const metadataPromise=Promise.all(
      metadataFiles.map((file,i)=>required(`./${file.replace(/^\.\//,'')}`,'json',`metadata-${i}`,metaPer))
    ).then(parts=>{
      for(const part of parts)if(!Array.isArray(part))throw new Error('metadata shard is not an array');
      return parts.flat();
    });

    const vectorPromise=required(`./${vectorsFile.replace(/^\.\//,'')}`,'buffer','vectors',vectorBytes);
    const normPromise=required(`./${normsFile.replace(/^\.\//,'')}`,'buffer','norms',normBytes);

    const movies=await metadataPromise;
    if(!Array.isArray(movies))throw new Error('metadata is not an array');
    cs.movies=movies;
    const withArt=movies.filter(m=>m.backdropPath);
    if(withArt.length){
      openingPool=withArt;
      openingArtBag=[];
    }

    const [vectorBuffer,normBuffer]=await Promise.all([vectorPromise,normPromise]);

    setOpeningStage(98,'preparing field');
    await new Promise(r=>requestAnimationFrame(r));

    const vectors=new Float32Array(vectorBuffer);
    const norms=new Float32Array(normBuffer);

    if(count!==movies.length)throw new Error(`manifest count ${count} != metadata ${movies.length}`);
    if(vectors.length!==count*dim)throw new Error(`vector length ${vectors.length} != ${count*dim}`);
    if(norms.length!==count)throw new Error(`norm length ${norms.length} != ${count}`);

    cs.complete=true;
    cache={movies,vectors,norms,manifest,dim};

    setStatus(statusLine('ready'));
    finishFieldOpening();
    return cache;
  })();

  try{return await fieldLoadPromise}
  catch(e){fieldLoadPromise=null;throw e}
}

/* ═══════ ARBITER ═══════ */
async function arbiter(payload,attempts=3){
  let last;
  for(let i=0;i<attempts;i++){
    try{
      const res=await fetch(ARBITER_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json','ngrok-skip-browser-warning':'true'},body:JSON.stringify(payload)});
      const raw=await res.text();
      if(!res.ok)throw new Error('arbiter '+res.status);
      return JSON.parse(raw);
    }catch(e){last=e;if(i<attempts-1){setState('engine busy · retrying');await pause(1000)}}
  }
  throw last;
}

function embedRows(d){
  if(Array.isArray(d?.vectors))return d.vectors;
  if(Array.isArray(d?.embeddings))return d.embeddings;
  if(Array.isArray(d))return d;
  throw new Error('unrecognized embed response');
}

function topKField(q,corpus,count,k=RETURN_COUNT){
  const dim=corpus.dim;
  const qv=Float32Array.from(q);
  let qNormSq=0;
  for(let j=0;j<dim;j++)qNormSq+=qv[j]*qv[j];
  const qNorm=Math.sqrt(qNormSq)||1;

  const top=[];
  const vectors=corpus.vectors;
  const norms=corpus.norms;

  for(let i=0;i<count;i++){
    const base=i*dim;
    let dot=0;
    for(let j=0;j<dim;j++)dot+=qv[j]*vectors[base+j];
    const score=dot/(qNorm*(norms[i]||1));

    if(top.length<k){
      let at=top.length;
      while(at>0&&score>top[at-1].score)at--;
      top.splice(at,0,{index:i,score});
    }else if(score>top[top.length-1].score){
      let at=top.length-1;
      while(at>0&&score>top[at-1].score)at--;
      top.splice(at,0,{index:i,score});
      top.length=k;
    }
  }

  return top;
}

async function measure(q,corpus,count){
  setState(`measuring ${count.toLocaleString()} titles`);

  const useFreq=corpus.manifest.use_freq!==false;
  const embedded=await arbiter({texts:[q],use_freq:useFreq});
  const qVector=embedRows(embedded)[0];
  if(!qVector||qVector.length!==corpus.dim)throw new Error('query embedding dimension mismatch');

  const measured=topKField(qVector,corpus,count,RETURN_COUNT);
  return measured.map(x=>({...corpus.movies[x.index],score:x.score}));
}

async function search(text){
  const q=(text||'').trim();
  if(!q)return;
  cancelLiveResonance();
  rollStop();
  currentQuery=q;
  $('#query').value=q;$('#revealQuery').value=q;
  requestAnimationFrame(()=>autoResize($('#revealQuery')));
  closeProjector();
  startLeader(q);
  try{
    let corpus;
    try{corpus=await loadCorpus()}
    catch(e){console.error(e);setState('the field would not open');await pause(900);toast('field unavailable — reload');show('landing');return}

    const count=fieldCount(corpus);
    $('#workLabel').textContent='summoning';
    setState(`measuring ${count.toLocaleString()} titles`);
    await pause(120);

    try{results=await measure(q,corpus,count)}
    catch(e){console.error(e);setState('the engine did not answer');await pause(900);toast('engine unreachable');show('landing');return}

    if(!results.length){setState('nothing came close');await pause(1000);show('landing');return}

    active=0;
    results.forEach(m=>{
      if(!m.posterPath&&!m.backdropPath&&!m.imageUrl){
        resolveArt(m).then(ok=>{if(ok&&$('#reveal').classList.contains('on'))render()}).catch(()=>{});
      }
    });
    render();
    Promise.all(results.map(hydrateProviders)).then(()=>{
      if($('#reveal').classList.contains('on'))render();
    }).catch(()=>{});
    // preload the hero so the reveal appears fully formed, then cross-fade
    const first=results[0];
    const heroArt=isSquare(first)?first.imageUrl:backdrop(first,'original');
    await new Promise(res=>{if(!heroArt)return res();const im=new Image();im.onload=res;im.onerror=res;im.src=heroArt;setTimeout(res,1200)});
    $('#reveal').classList.add('on');
    requestAnimationFrame(()=>autoResize($('#revealQuery')));
    await pause(480);
    $('#landing').classList.remove('on');
    $('#leader').classList.remove('on');
    history.replaceState(null,'','#'+encodeURIComponent(q));
  }finally{stopLeader()}
}


const providerCache=new Map();
async function hydrateProviders(m){
  if(!m?.tmdbId||!(m.type==='film'||m.type==='series'))return m;
  const kind=m.tmdbKind==='tv'?'tv':'movie';
  const key=`${kind}:${m.tmdbId}`;
  let data=providerCache.get(key);
  if(!data){
    try{
      const d=await fetch(`${TMDB_BASE}/${kind}/${m.tmdbId}/watch/providers?api_key=${TMDB_KEY}`).then(r=>r.json());
      const us=d?.results?.US||{};
      const seen=new Set(), names=[];
      for(const bucket of ['flatrate','free','ads','buy','rent']){
        for(const p of us[bucket]||[]){
          const name=(p.provider_name||'').trim();
          if(name&&!seen.has(name)){seen.add(name);names.push(name)}
        }
      }
      data={names,link:us.link||null};
    }catch(e){data={names:[],link:null}}
    providerCache.set(key,data);
  }
  if(data.names.length)m.availability=data.names.slice(0,4).join(' · ');
  if(data.link)m.externalUrl=data.link;
  return m;
}

/* ═══════ REVEAL ═══════ */
const trailerCache=new Map();
async function fetchTrailer(m){
  if(!m?.tmdbId)return null;
  const key=`${m.tmdbKind}:${m.tmdbId}`;
  if(trailerCache.has(key))return trailerCache.get(key);
  try{
    const d=await fetch(`${TMDB_BASE}/${m.tmdbKind==='tv'?'tv':'movie'}/${m.tmdbId}/videos?api_key=${TMDB_KEY}&language=en-US`).then(r=>r.json());
    const scored=(d.results||[]).filter(v=>v.site==='YouTube'&&v.key).map(v=>{
      const n=(v.name||'').toLowerCase();let s=0;
      if(v.type==='Trailer')s+=10;if(v.type==='Teaser')s+=4;if(v.official)s+=4;
      if(n.includes('official trailer'))s+=5;else if(n.includes('trailer'))s+=3;
      return{v,s};
    }).sort((a,b)=>b.s-a.s);
    const pick=scored[0]?.v||null;
    trailerCache.set(key,pick);return pick;
  }catch(e){return null}
}

function resultKey(r){
  return [r?.type||'',r?.sourceId||r?.tmdbId||r?.externalUrl||'',r?.title||'',r?.year||''].join('|');
}
function renderDeck(){
  const deck=$('#deck');
  if(!deck)return;

  const old=new Map();
  [...deck.children].forEach(tile=>{
    const key=tile.dataset.key||'';
    if(key)old.set(key,{tile,rect:tile.getBoundingClientRect()});
  });

  const frag=document.createDocumentFragment();
  results.forEach((r,i)=>{
    const key=resultKey(r);
    const prior=old.get(key);
    const tile=prior?.tile||document.createElement('button');
    tile.type='button';
    tile.className=`tile ${i===active?'on':''}`;
    tile.dataset.i=String(i);
    tile.dataset.key=key;
    tile.setAttribute('aria-current',String(i===active));

    if(!prior){
      tile.innerHTML=`
        <span class="shot"><img alt="" loading="lazy" decoding="async"><span class="n"></span></span>
        <span class="cap"></span>
        <span class="sc"></span>`;
    }

    const im=tile.querySelector('img');
    const src=poster(r,'w342');
    if(im&&im.src!==src)im.src=src;
    const n=tile.querySelector('.n');if(n)n.textContent=String(i+1).padStart(2,'0');
    const cap=tile.querySelector('.cap');if(cap)cap.textContent=r.title||'';
    const sc=tile.querySelector('.sc');if(sc)sc.textContent=Number(r.score).toFixed(3);
    tile.onclick=()=>{active=+tile.dataset.i;closeProjector();render()};
    frag.appendChild(tile);
  });

  deck.replaceChildren(frag);

  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    [...deck.children].forEach(tile=>{
      const prior=old.get(tile.dataset.key||'');
      const now=tile.getBoundingClientRect();
      if(prior){
        const dx=prior.rect.left-now.left;
        const dy=prior.rect.top-now.top;
        if(Math.abs(dx)>.5||Math.abs(dy)>.5){
          tile.animate([
            {transform:`translate(${dx}px,${dy}px)`,opacity:.68},
            {transform:'translate(0,0)',opacity:tile.classList.contains('on')?1:.5}
          ],{duration:390,easing:'cubic-bezier(.22,.8,.22,1)'});
        }
      }else{
        tile.animate([
          {transform:'translateY(8px) scale(.985)',opacity:0},
          {transform:'translateY(0) scale(1)',opacity:tile.classList.contains('on')?1:.5}
        ],{duration:330,easing:'cubic-bezier(.22,.8,.22,1)'});
      }
    });
  }

  const on=$('#deck .tile.on');
  if(on){
    requestAnimationFrame(()=>{
      const left=on.offsetLeft-(deck.clientWidth-on.offsetWidth)/2;
      deck.scrollTo({left:Math.max(0,left),behavior:'smooth'});
    });
  }
}
function step(d,{play=false}={}){
  if(!results.length)return;
  active=(active+d+results.length)%results.length;
  closeProjector();
  render();
  if(play)openProjector();
}


/* ═══════ LIVE RESONANCE ═══════
   The precomputed field re-ranks while the user is still typing.
   Only the current thought may commit; older /v1/embed answers are discarded. */
function cancelLiveResonance(){
  liveGeneration++;
  clearTimeout(liveTimer);
  clearTimeout(liveArtTimer);
  liveTimer=null;
  liveArtTimer=null;
  livePending=null;
}

function liveInputValue(source){
  const el=source==='landing'?$('#query'):$('#revealQuery');
  return (el?.value||'').trim();
}

function queueLiveResonance(text,source='reveal',{immediate=false,commit=false}={}){
  // Preserve the exact text the person typed, including trailing spaces.
  // Only the measurement text is trimmed; the editable thought must never be normalized by a live result.
  const raw=String(text||'');
  const q=raw.trim();
  const generation=++liveGeneration;
  clearTimeout(liveTimer);

  if(q.length<LIVE_RESONANCE_MIN_CHARS){
    livePending=null;
    return;
  }

  livePending={q,raw,source,generation,commit};
  liveTimer=setTimeout(pumpLiveResonance,immediate?0:LIVE_RESONANCE_DEBOUNCE);
}

function animateLiveSwap(){
  const reveal=$('#reveal');
  if(!reveal?.classList.contains('on'))return;
  reveal.classList.remove('live-swap');
  void reveal.offsetWidth;
  reveal.classList.add('live-swap');
  clearTimeout(liveSwapTimer);
  liveSwapTimer=setTimeout(()=>reveal.classList.remove('live-swap'),520);
}

function scheduleLiveArt(generation){
  clearTimeout(liveArtTimer);
  liveArtTimer=setTimeout(()=>{
    if(generation!==liveGeneration)return;
    const snapshot=[...results];
    snapshot.forEach(m=>{
      if(m.posterPath||m.backdropPath||m.imageUrl)return;
      resolveArt(m).then(ok=>{
        if(ok&&generation===liveGeneration&&$('#reveal').classList.contains('on')&&results.includes(m))render();
      }).catch(()=>{});
    });
  },850);
}

function commitLiveResults(next,q,raw,source,generation,commit){
  if(generation!==liveGeneration)return;
  if(liveInputValue(source)!==q)return;
  if(!next?.length)return;

  const wasLanding=$('#landing').classList.contains('on');
  const landingHadFocus=document.activeElement===$('#query');

  currentQuery=q;
  results=next;
  active=0;
  closeProjector();

  const landingInput=$('#query');
  const revealInput=$('#revealQuery');
  const sourceInput=source==='landing'?landingInput:revealInput;
  // Read the current exact editor value at commit time. Generation checks above guarantee
  // it belongs to this thought; importantly, it may end in a space while the next word is forming.
  const exactText=sourceInput?.value ?? raw ?? q;

  // Never write back into the active editor. Doing so used to replace "word " with "word"
  // when a live measurement returned, swallowing the space immediately before the next letter.
  // Only synchronize the hidden counterpart used when moving between landing and reveal.
  if(source==='landing'){
    if(revealInput&&revealInput.value!==exactText)revealInput.value=exactText;
  }else{
    if(landingInput&&landingInput.value!==exactText)landingInput.value=exactText;
  }

  if(!$('#reveal').classList.contains('on')){
    rollStop();
    show('reveal');
    render();
  }else{
    render();
    animateLiveSwap();
  }

  requestAnimationFrame(()=>autoResize(revealInput));

  if(wasLanding&&landingHadFocus&&revealInput){
    requestAnimationFrame(()=>{
      revealInput.focus({preventScroll:true});
      try{revealInput.setSelectionRange(revealInput.value.length,revealInput.value.length)}catch(e){}
      autoResize(revealInput);
    });
  }

  if(commit)history.replaceState(null,'','#'+encodeURIComponent(q));
  scheduleLiveArt(generation);
}

async function pumpLiveResonance(){
  if(liveInFlight||!livePending)return;
  const job=livePending;
  livePending=null;
  liveInFlight=true;

  try{
    const corpus=cache||await loadCorpus();
    if(job.generation!==liveGeneration)return;
    const count=fieldCount(corpus);
    const next=await measure(job.q,corpus,count);
    commitLiveResults(next,job.q,job.raw,job.source,job.generation,job.commit);
  }catch(e){
    console.error('live resonance failed',e);
  }finally{
    liveInFlight=false;
    if(livePending){
      clearTimeout(liveTimer);
      liveTimer=setTimeout(pumpLiveResonance,0);
    }
  }
}

function scheduleLiveFrom(el,source){
  autoResize(el);
  queueLiveResonance(el.value,source);
}

function commitLiveExact(el,source){
  const q=(el?.value||'').trim();
  if(!q)return;
  queueLiveResonance(q,source,{immediate:true,commit:true});
}

/* ═══════ INPUT ═══════ */
function autoResize(el){
  if(!el)return;
  if(el.offsetParent===null&&el.offsetHeight===0)return; // hidden plate: keep CSS height, don't zero it
  el.style.height='auto';
  const max=parseFloat(getComputedStyle(el).maxHeight)||Infinity;
  el.style.height=Math.min(max,el.scrollHeight)+'px';
}
function bindInput(el,source){
  el.addEventListener('input',()=>scheduleLiveFrom(el,source));
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      commitLiveExact(el,source);
    }
  });
}
bindInput($('#query'),'landing');
$('#query').addEventListener('focus',()=>{
  const q=$('#query');
  const visibleExample=(q.getAttribute('placeholder')||'').replace(/▏$/,'').trim();

  // A rotating example becomes real input the instant the field is entered.
  // No extra button or UI: submit it as-is, or start typing to replace the selection.
  if(!q.value && visibleExample){
    q.value=visibleExample;
    q.setAttribute('placeholder','');
    resetPlaceholderHeight(q);
    autoResize(q);
    requestAnimationFrame(()=>{
      try{q.setSelectionRange(0,q.value.length)}catch(e){}
    });
    return;
  }

  q.setAttribute('placeholder','');
  resetPlaceholderHeight(q);
});

bindInput($('#revealQuery'),'reveal');

function landingSummonValue(){
  const q=$('#query');
  const typed=(q.value||'').trim();
  if(typed)return typed;

  // The rotating example lives in the placeholder until the user clicks the field.
  // The arrow must be able to summon that visible example directly too.
  const visible=(q.getAttribute('placeholder')||'').replace(/▏$/,'').trim();
  if(!visible)return '';
  q.value=visible;
  q.setAttribute('placeholder','');
  resetPlaceholderHeight(q);
  autoResize(q);
  return visible;
}

function goHomeAndReplay(){

  closeProjector();
  rollStop();
  show('landing');
  history.replaceState(null,'',location.pathname);

  const q=$('#query');
  if(document.activeElement)document.activeElement.blur();
  q.value='';
  q.setAttribute('placeholder','');
  resetPlaceholderHeight(q);
  autoResize(q);

  // Replay the homepage examples from the beginning without forcing focus into the field.
  requestAnimationFrame(()=>rollStart({restart:true}));
}

$('#home').onclick=goHomeAndReplay;
$('#landingHome').onclick=goHomeAndReplay;
$('#leaderHome').onclick=goHomeAndReplay;
$('#prev').onclick=()=>step(-1);
$('#next').onclick=()=>step(1);
$('#play').onclick=()=>openProjector();
$('#projClose').onclick=closeProjector;
$('#projPrev').onclick=()=>step(-1,{play:true});
$('#projNext').onclick=()=>step(1,{play:true});
$('#projector').addEventListener('mousemove',()=>{const p=$('#projector');p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),1500)});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeProjector();
  if(!results.length||document.activeElement.tagName==='TEXTAREA')return;
  if(!$('#reveal').classList.contains('on')&&!document.body.classList.contains('playing'))return;
  if(e.key==='ArrowRight')step(1);
  if(e.key==='ArrowLeft')step(-1);
});


/* auto-typed example queries cycle through the input placeholder */
let twTimer=null,twI=0,twC=0,twDel=false;
function twTick(){
  const el=$('#query');
  if(!el||!$('#landing').classList.contains('on')||document.activeElement===el||el.value.trim()){twTimer=setTimeout(twTick,700);return}
  const phrase=EXAMPLES[twI%EXAMPLES.length].q;
  if(!twDel){
    twC++;el.setAttribute('placeholder',phrase.slice(0,twC));
    if(twC>=phrase.length){twDel=true;twTimer=setTimeout(twTick,2000);return}
    twTimer=setTimeout(twTick,34+Math.random()*40);return;
  }
  twC--;el.setAttribute('placeholder',phrase.slice(0,Math.max(0,twC)));
  if(twC<=0){twDel=false;twI=(twI+1)%EXAMPLES.length;twTimer=setTimeout(twTick,380);return}
  twTimer=setTimeout(twTick,16+Math.random()*18);
}
function startTW(){}   /* typewriter retired — the landing demo carries the live examples now */

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function voice(btnSel,targetSel){
  const btn=$(btnSel),t=$(targetSel);
  if(!SR){btn.hidden=true;return}
  btn.onclick=()=>{
    const rec=new SR();rec.lang='en-US';rec.interimResults=true;
    btn.classList.add('listening');
    let final='';
    rec.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){const x=e.results[i][0].transcript;e.results[i].isFinal?final+=x:interim+=x}
      const s=(final||interim).trim();
      if(s){t.value=s;autoResize(t);t.dispatchEvent(new Event('input',{bubbles:true}))}
    };
    rec.onend=rec.onerror=()=>btn.classList.remove('listening');
    rec.start();
  };
}
voice('#voiceBtn','#query');
voice('#revealVoiceBtn','#revealQuery');


/* ═══════ TYPE ANYWHERE — the surface itself is the input ═══════ */
function activeThoughtInput(){
  if($('#landing')?.classList.contains('on')) return $('#query');
  if($('#reveal')?.classList.contains('on')) return $('#revealQuery');
  return null;
}

function focusThoughtSurface(el,{replaceExample=false}={}){
  if(!el)return;
  if(el===$('#query')&&replaceExample&&!el.value){
    // Clicking the cinematic surface should begin a new thought, not force the demo phrase into it.
    rollStop();
    el.setAttribute('placeholder','');
    resetPlaceholderHeight(el);
  }
  try{el.focus({preventScroll:true})}catch(e){el.focus()}
  try{el.setSelectionRange(el.value.length,el.value.length)}catch(e){}
}

$('#landing')?.addEventListener('pointerdown',e=>{
  if(e.target.closest('button,a'))return;
  const q=$('#query');
  if(e.target!==q)focusThoughtSurface(q,{replaceExample:true});
});

// Printable keys can enter the field from anywhere on the active cinematic surface.
document.addEventListener('keydown',e=>{
  if(e.defaultPrevented||e.metaKey||e.ctrlKey||e.altKey)return;
  if(e.key.length!==1)return;
  const el=activeThoughtInput();
  if(!el||document.activeElement===el)return;
  if(e.target&&['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;

  e.preventDefault();
  if(el===$('#query')){
    rollStop();
    el.setAttribute('placeholder','');
    resetPlaceholderHeight(el);
  }
  el.value=(el.value||'')+e.key;
  focusThoughtSurface(el);
  autoResize(el);
  el.dispatchEvent(new Event('input',{bubbles:true}));
});

/* ═══════ INIT ═══════ */
(async()=>{
  try{
    setStatus('');

    // Hold the user on a deliberate cinematic loading gate. Artwork cycles
    // while the full field loads; the homepage does not appear half-ready.
    startOpeningCover();
    primeLoadingCovers();

    await loadCorpus();
    setStatus(statusLine('ready'));

    const h=decodeURIComponent(location.hash.replace(/^#/,''));
    if(h){
      await whenBarFull();
      await pause(260);
      stopOpeningCover();
      search(h);
      return;
    }

    await enterReadyHomepage();
  }catch(e){
    console.error(e);
    const label=$('#openingLabel');
    const count=$('#openingCount');
    if(label)label.textContent='field unavailable';
    if(count)count.textContent='reload to try again';
    setStatus('');
    console.error('precomputed field load failed',e);
  }
})();

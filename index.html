<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0A09">
<title>SUMMON — find anything on Netflix by meaning</title>
<meta name="description" content="Describe what you want. SUMMON measures the whole Netflix field and returns what fits.">
<link rel="icon" href="./summon-favicon.svg" type="image/svg+xml">
<link rel="icon" href="./summon-favicon.ico" sizes="any">
<link rel="icon" href="./summon-favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="./summon-favicon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="./summon-apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="SUMMON">
<meta property="og:title" content="SUMMON — find anything on Netflix by meaning">
<meta property="og:description" content="Say what you want, we’ll find what fits. Films, series, podcasts, shorts, games, live — searched by meaning.">
<meta property="og:image" content="./summon-og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SUMMON — find anything on Netflix by meaning">
<meta name="twitter:description" content="Say what you want, we’ll find what fits.">
<meta name="twitter:image" content="./summon-og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<base target="_blank">
<style>
/* ══════════════════════════════════════════════
   SUMMON — full bleed
   ══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --film:#0A0A09;
  --white:#F6F4EF;
  --dim:rgba(246,244,239,.56);
  --faint:rgba(246,244,239,.30);
  --ghost:rgba(246,244,239,.14);
  --hair:rgba(246,244,239,.20);
  --chip:rgba(246,244,239,.14);
  --accent:#E50914;
  --accent-soft:rgba(229,9,20,.16);
  --accent-glow:rgba(229,9,20,.42);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'DM Mono',ui-monospace,Menlo,monospace;
  --pad:clamp(18px,2.6vw,42px);
  --label:clamp(9px,.72vw,11px);
  --deck-h:196px;
}

html,body{height:100%;background:var(--film);color:var(--white);font-family:var(--mono);overflow:hidden}
button,textarea{font:inherit;color:inherit;background:none;border:0}
button{cursor:pointer}
::selection{background:var(--white);color:var(--film)}
:focus-visible{outline:1px solid var(--white);outline-offset:4px}
#query:focus,#query:focus-visible,#revealQuery:focus,#revealQuery:focus-visible{outline:none}

.lbl{font-family:var(--mono);font-size:var(--label);letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
.lbl b{color:var(--white);font-weight:400}

.plate{position:fixed;inset:0;display:none}
.plate.on{display:block}

/* ─────── lockup ─────── */
.mark{display:inline-flex;align-items:center;text-align:left;line-height:1}
.mark-word{font-family:var(--serif);font-weight:400;font-size:30px;line-height:.86;letter-spacing:.05em;text-transform:uppercase;color:var(--white)}
button.mark:hover .mark-word{opacity:.7}

/* ─────── shared image bed ─────── */
.canvas{position:absolute;inset:0;overflow:hidden;background:var(--film)}
.canvas img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;
  opacity:0;transition:opacity 1.4s ease;animation:drift 34s ease-in-out infinite alternate;
}
.canvas img.on{opacity:1}
@keyframes drift{from{transform:scale(1.02)}to{transform:scale(1.09) translate3d(-1%,.6%,0)}}
.canvas::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(10,10,9,.66) 0%,rgba(10,10,9,.06) 22%,rgba(10,10,9,.20) 48%,rgba(10,10,9,.94) 100%),
    linear-gradient(90deg,rgba(10,10,9,.72) 0%,rgba(10,10,9,.10) 48%,rgba(10,10,9,.30) 100%);
}

.corner{position:absolute;z-index:8;display:flex;align-items:center;gap:16px}
.tl{top:var(--pad);left:var(--pad)}
.tr{top:var(--pad);right:var(--pad)}
.br{bottom:var(--pad);right:var(--pad)}

/* ═══════ LANDING ═══════ */
#landing .head{position:absolute;z-index:6;left:var(--pad);bottom:calc(var(--pad) + 66px);width:min(62vw,900px)}
.title{font-family:var(--serif);font-size:clamp(52px,7vw,124px);line-height:.86;letter-spacing:-.025em}
.title i{font-style:italic}

.line{margin-top:28px;display:flex;align-items:flex-end;gap:14px;border-bottom:1px solid var(--white);padding-bottom:10px}
#query{flex:1;min-width:0;resize:none;overflow:hidden;font-family:var(--serif);font-size:clamp(22px,2.4vw,38px);line-height:1.1;min-height:1.1em;max-height:3.4em;caret-color:var(--white)}
#query::placeholder{color:var(--faint)}
.icon{width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;border:1px solid var(--hair);color:var(--dim)}
.icon:hover{color:var(--white);border-color:var(--white)}
.icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.icon.listening{background:var(--white);color:var(--film);border-color:var(--white)}
.send{width:38px;height:38px;flex:0 0 auto;background:var(--white);color:var(--film);display:grid;place-items:center;font-size:16px}
.send:hover{background:var(--dim)}

.credits{position:absolute;z-index:6;right:var(--pad);top:50%;translate:0 -50%;text-align:right;max-width:24vw}
.credits .stack{font-family:var(--serif);font-size:clamp(17px,1.35vw,24px);line-height:1.3}
.credits .stack span{display:block}
.subhint{margin-top:18px;font-family:var(--mono);font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.formats{margin-top:10px;font-family:var(--mono);font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}

.rail{position:absolute;z-index:6;left:var(--pad);bottom:var(--pad);right:calc(var(--pad) + 210px);display:flex;flex-wrap:wrap;align-items:center;gap:2px}
.rail .rail-lbl{margin-right:10px;white-space:nowrap}
.rail button{padding:8px 11px;font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
.rail button:hover{color:var(--white)}
.rail button.on{background:var(--chip);color:var(--white)}

.depth{display:flex;align-items:center;gap:16px}
.depth-lbl{color:var(--faint);letter-spacing:.2em}
.depth button{position:relative;font-size:var(--label);letter-spacing:.2em;text-transform:uppercase;color:var(--faint);padding-bottom:3px;border-bottom:1px solid transparent}
.depth button.loading{color:var(--dim)}
.depth button.loading::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--accent);animation:depthLoad 1s ease-in-out infinite}
@keyframes depthLoad{0%{transform:scaleX(0);transform-origin:left}45%{transform:scaleX(1);transform-origin:left}55%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
.depth button:hover{color:var(--dim)}
.depth button.on{color:var(--white);border-color:var(--white)}

/* ═══════ LEADER — reading the field ═══════ */
#leader{background:var(--film)}
#leader .canvas img{filter:brightness(.62) contrast(1.03) saturate(.96)}
#leader .canvas img.on{opacity:1}
#leader .canvas::after{
  background:
    radial-gradient(135% 130% at 50% 36%, rgba(10,10,9,0) 44%, rgba(10,10,9,.74) 100%),
    linear-gradient(180deg, rgba(10,10,9,.5) 0%, rgba(10,10,9,0) 24%, rgba(10,10,9,0) 60%, rgba(10,10,9,.94) 100%);
}

/* the field, passing: real candidate titles, read at speed */
.field{position:absolute;inset:0;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:0;overflow:hidden;
  mask-image:linear-gradient(180deg,transparent,#000 18%,#000 82%,transparent);
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 18%,#000 82%,transparent);
  transition:opacity .6s ease,filter .6s ease;
}
.field-col{overflow:hidden;position:relative}
.field-col .run{position:absolute;left:0;right:0;top:0;display:grid;gap:16px;padding:0 clamp(10px,1.6vw,26px);will-change:transform}
.field-col:nth-child(1) .run{animation:runUp 34s linear infinite}
.field-col:nth-child(2) .run{animation:runUp 26s linear infinite;opacity:.7}
.field-col:nth-child(3) .run{animation:runUp 42s linear infinite;opacity:.5}
@keyframes runUp{from{transform:translateY(0)}to{transform:translateY(-50%)}}
.field-col span{
  display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ghost);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.field-col:nth-child(2){text-align:center}
.field-col:nth-child(3){text-align:right}
body.locked .field{opacity:0;filter:blur(6px)}

/* the answer, arriving through a gate */
.resolve{
  position:absolute;inset:0;z-index:3;width:100%;height:100%;object-fit:cover;object-position:center 28%;
  opacity:0;clip-path:inset(50% 0 50% 0);
}
body.locked .resolve{animation:openGate 1.6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes openGate{
  0%{opacity:0;clip-path:inset(50% 0 50% 0);filter:brightness(.28) contrast(1.4) blur(12px)}
  28%{opacity:1;filter:brightness(.6) contrast(1.1) blur(6px)}
  100%{opacity:1;clip-path:inset(0 0 0 0);filter:none}
}
body.launch #leader{animation:fadeOut .5s ease forwards}
@keyframes fadeOut{to{opacity:0}}
#reveal.on{animation:revealIn .48s ease both}
@keyframes revealIn{from{opacity:0}to{opacity:1}}

.work{position:absolute;z-index:6;left:var(--pad);right:var(--pad);top:50%;translate:0 -50%;text-align:center;pointer-events:none}
.work .qt{
  font-family:var(--serif);font-size:clamp(30px,4.4vw,80px);line-height:.94;letter-spacing:-.025em;
  max-width:20ch;margin:16px auto 0;text-wrap:balance;
  text-shadow:0 4px 34px rgba(0,0,0,.82),0 1px 5px rgba(0,0,0,.55);
}
body.locked .work{opacity:0;transform:translate(0,-54%);transition:opacity .6s ease,transform .6s ease}

/* the answer's name, landing where the query stood */
.verdict{position:absolute;z-index:7;left:var(--pad);bottom:calc(var(--pad) + 44px);opacity:0}
.verdict .n{font-family:var(--serif);font-size:clamp(30px,4vw,66px);line-height:.9;letter-spacing:-.02em}
.verdict #verdictLbl b{color:var(--accent)}
body.locked .verdict{animation:verdictIn .8s .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes verdictIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.state{position:absolute;z-index:7;left:var(--pad);right:var(--pad);bottom:var(--pad);display:flex;justify-content:space-between;gap:20px;align-items:baseline}
.elapsed{font-variant-numeric:tabular-nums}
.shuttle{position:absolute;z-index:7;left:var(--pad);right:var(--pad);bottom:calc(var(--pad) + 26px);height:1px;background:var(--hair);overflow:hidden}
.shuttle::after{content:'';position:absolute;top:0;bottom:0;left:0;width:20%;background:var(--accent);animation:shuttle 2.1s cubic-bezier(.65,0,.35,1) infinite}
@keyframes shuttle{from{left:-20%}to{left:100%}}
body.locked .shuttle::after{animation:none;left:0;width:100%;transition:width .5s ease}

/* ═══════ REVEAL — cinematic, in colour ═══════ */
#reveal{background:var(--film)}
#revealCanvas{position:absolute;inset:0;overflow:hidden;background:#0d0d0c}
#revealCanvas img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 24%}
#stillBg{opacity:0}
#still{opacity:1;filter:saturate(1.06) contrast(1.03)}
#revealCanvas::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(8,8,7,.62) 0%,rgba(8,8,7,.10) 26%,rgba(8,8,7,.34) 56%,rgba(8,8,7,.97) 100%),
    linear-gradient(90deg,rgba(8,8,7,.70) 0%,rgba(8,8,7,.03) 52%,rgba(8,8,7,.40) 100%);
}
/* square / no-backdrop art → blurred colour bed + card */
#revealCanvas.square #still{opacity:0}
#revealCanvas.square #stillBg{opacity:1;filter:blur(70px) brightness(.5) saturate(1.15);transform:scale(1.35)}
#revealCanvas.square ~ #revealFrame #card{display:block}

#revealFrame{position:absolute;inset:0;z-index:6;display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:var(--pad);gap:20px}

.bar{display:grid;grid-template-columns:1fr minmax(280px,44vw) 1fr;align-items:center;gap:24px}
.bar .nav{justify-self:end}
.summon-bar{min-width:0}
.summon-bar .lbl{display:block;margin-bottom:6px;color:var(--accent);letter-spacing:.24em}
.summon-bar form{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--hair);padding-bottom:7px}
.summon-bar form:focus-within{border-color:var(--accent)}
#revealQuery{flex:1;min-width:0;resize:none;overflow:hidden;height:1.35em;font-family:var(--serif);font-size:18px;line-height:1.35}
#revealQuery::placeholder{color:var(--faint)}
.summon-bar .icon,.summon-bar .send{width:30px;height:30px}
.summon-bar .send{background:var(--accent);color:#fff}
.summon-bar .send:hover{background:#ff1a25}
.summon-bar .icon svg{width:14px;height:14px}

.nav{display:flex;align-items:center;gap:12px}
.nav .pos{font-size:var(--label);letter-spacing:.2em;color:var(--dim);font-variant-numeric:tabular-nums}
.nav .pos b{color:var(--accent);font-weight:400}
.nav .arrow{width:34px;height:34px;display:grid;place-items:center;border:1px solid var(--hair);font-size:14px}
.nav .arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.stage{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:end;gap:32px;min-height:0}
.info{max-width:min(60ch,54vw);min-width:0}
.eyebrow{display:block;margin-bottom:14px}
.eyebrow b{color:var(--white)}
#score{color:var(--accent)}
#title{font-family:var(--serif);font-size:clamp(40px,5.2vw,92px);line-height:.88;letter-spacing:-.03em;overflow-wrap:break-word;text-shadow:0 4px 44px rgba(0,0,0,.62)}
.meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:4px 0}
.meta span{font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.meta span:not(:last-child)::after{content:'/';margin:0 10px;color:var(--faint)}
.synopsis{margin-top:18px;max-width:54ch;font-family:var(--serif);font-size:clamp(16px,1.35vw,22px);line-height:1.42;color:var(--white);opacity:.84;text-shadow:0 2px 34px rgba(0,0,0,.7)}
.synopsis:empty{display:none}
.actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}
.actions button{padding:11px 15px;border:1px solid var(--hair);font-size:var(--label);letter-spacing:.18em;text-transform:uppercase;color:var(--white)}
.actions button:hover{border-color:var(--white)}
.actions button.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
.actions button.solid:hover{background:#ff1a25;box-shadow:0 0 24px var(--accent-glow)}
.actions button[disabled]{opacity:.32;pointer-events:none}

/* square cover art becomes a card */
#card{display:none;align-self:end;width:clamp(190px,21vw,300px);aspect-ratio:1;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);border:1px solid var(--hair)}
#card img{width:100%;height:100%;object-fit:cover;display:block}

/* deck */
.deck{align-self:end}
.deck-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.deck-strip{display:flex;gap:10px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;padding-bottom:2px}
.deck-strip::-webkit-scrollbar{display:none}
.tile{flex:0 0 auto;width:clamp(74px,5.8vw,96px);text-align:left;opacity:.5;transition:opacity .2s ease}
.tile:hover{opacity:.85}
.tile.on{opacity:1}
.tile .shot{position:relative;display:block;width:100%;aspect-ratio:2/3;overflow:hidden;background:#141412;border:1px solid transparent}
.tile.on .shot{border-color:var(--accent)}
.tile .shot img{width:100%;height:100%;object-fit:cover;filter:saturate(1.02)}
.tile .n{position:absolute;left:0;top:0;background:rgba(10,10,9,.76);padding:3px 5px;font-size:9px;letter-spacing:.08em}
.tile.on .n{background:var(--accent);color:#fff}
.tile .cap{display:block;margin-top:7px;font-size:9px;line-height:1.3;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile.on .cap{color:var(--white)}
.tile .sc{display:block;margin-top:3px;font-size:9px;color:var(--dim);font-variant-numeric:tabular-nums}
.tile.on .sc{color:var(--accent)}

/* projector */
#projector{position:fixed;inset:0;z-index:900;display:none;background:#000}
body.playing{overflow:hidden}
body.playing #projector{display:block}
#projFrame{position:absolute;inset:0;width:100%;height:100%;border:0}
.pbtn{position:fixed;z-index:920;display:grid;place-items:center;width:44px;height:44px;color:#fff;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.22);opacity:0;transition:opacity .2s}
#projector.show .pbtn{opacity:1}
#projClose{top:16px;right:16px;font-size:20px}
#projPrev{left:16px;top:50%;translate:0 -50%}
#projNext{right:16px;top:50%;translate:0 -50%}
#projQ{position:fixed;z-index:915;top:22px;left:50%;translate:-50% 0;max-width:56vw;font-size:var(--label);letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.toast{position:fixed;left:50%;bottom:26px;translate:-50% 0;z-index:999;background:var(--white);color:var(--film);font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:11px 15px}

/* ─────── responsive ─────── */
@media(max-width:1000px){
  :root{--pad:16px}
  .credits{top:auto;bottom:calc(var(--pad) + 186px);translate:0;max-width:46vw}
  .credits .stack{font-size:16px}
  #landing .head{width:auto;right:var(--pad);bottom:calc(var(--pad) + 54px)}
  .title{font-size:clamp(38px,10.5vw,64px)}
  .rail{right:var(--pad);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  #landing .br{bottom:auto;top:var(--pad);right:var(--pad)}
  .field{grid-template-columns:1fr}
  .field-col:nth-child(n+2){display:none}
  .field-col span{text-align:center}
  .work .qt{font-size:clamp(26px,8vw,44px)}
  #revealFrame{gap:14px}
  .bar{grid-template-columns:auto 1fr;grid-template-areas:'mark nav' 'q q';row-gap:12px}
  .bar>.mark{grid-area:mark}
  .bar>.nav{grid-area:nav}
  .summon-bar{grid-area:q}
  .stage{grid-template-columns:1fr;align-items:end;gap:16px}
  #card{width:min(38vw,150px);justify-self:end;order:-1}
  #title{font-size:clamp(34px,10vw,56px)}
  .meta span:nth-child(n+4){display:none}
  .tile{width:64px}
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition-duration:.01ms !important}}
/* ── mobile landing: stop the top-right + credits overlap ── */
@media(max-width:1000px){
  .credits{display:none}
  #landing .corner.br{display:none}
  .corner.tr{right:var(--pad);left:auto}
  .depth{gap:12px;white-space:nowrap}
  .depth-lbl{display:none}
  .depth button{font-size:10px;letter-spacing:.08em}
  #landing .head{left:var(--pad);right:var(--pad);width:auto;bottom:calc(var(--pad) + 30px)}
  .title{font-size:clamp(32px,8.6vw,56px)}
  .line{gap:10px}
  .subhint{margin-top:14px}
}
@media(max-width:480px){
  .mark-word{font-size:26px}
  .depth{gap:9px}
  .depth button{font-size:9px;letter-spacing:.05em}
  #query{font-size:clamp(20px,6.2vw,30px)}
}

</style>
</head>
<body>

<!-- ═════════ LANDING ═════════ -->
<section class="plate on" id="landing">
  <div class="canvas"><img id="coverA" alt=""><img id="coverB" alt=""></div>

  <div class="corner tl">
    <div class="mark"><span class="mark-word">Summon</span></div>
  </div>
  <div class="corner tr">
    <div class="depth" role="group" aria-label="How many titles to search">
      <span class="lbl depth-lbl">titles</span>
      <button class="on" data-depth="surface" type="button">250</button>
      <button data-depth="field" type="button">900</button>
      <button data-depth="archive" type="button">all</button>
    </div>
  </div>

  <div class="head">
    <h1 class="title"><i>Find anything on Netflix by meaning.</i></h1>
    <form id="searchForm">
      <div class="line">

function fieldArt(m,mode='poster'){

}

function jsonp(url,ms=6500){
  return new Promise((res,rej)=>{
    const cb='__s'+Math.random().toString(36).slice(2);
    const el=document.createElement('script');
    const done=()=>{delete window[cb];el.remove()};
    window[cb]=d=>{res(d);done()};
    el.onerror=()=>{rej(new Error('jsonp'));done()};
    el.src=url+'&callback='+cb;
    document.head.appendChild(el);
    setTimeout(()=>{if(window[cb]){rej(new Error('timeout'));done()}},ms);
  });
}
const bigArt=u=>String(u||'').replace(/[0-9]+x[0-9]+bb?[.](jpg|png)/,'1400x1400bb.$1');

  if(entity)q.set('entity',entity);
  const d=await jsonp(`https://itunes.apple.com/search?${q}`);
  const hit=(d?.results||[]).find(r=>r.artworkUrl100||r.artworkUrl60);
  return hit?bigArt(hit.artworkUrl100||hit.artworkUrl60):null;
}

  return hit?img(hit.backdrop_path||hit.poster_path,'w1280'):null;
}
function artTerms(title){
  const t=title.split(' — ')[0].split(' – ')[0].trim();

}
async function resolveArt(m){
  const terms=artTerms(m.title);
  const plans=m.type==='podcast'
    ? [...terms.map(t=>()=>itunesArt(t,'podcast','podcast')),...terms.map(t=>()=>itunesArt(t,'all'))]

      : [...terms.map(t=>()=>tmdbArt(t)),...terms.map(t=>()=>itunesArt(t,'tvShow','tvSeason')),...terms.map(t=>()=>itunesArt(t,'all'))];
  for(const plan of plans){
    try{const url=await plan();if(url){m.imageUrl=url;return true}}catch(e){}
  }
  return false;
}

async function resolveAllArt(){
  if(artRunning)return;
  artRunning=true;
  const queue=cs.movies.filter(m=>!m.posterPath&&!m.imageUrl);

  await Promise.all([worker(),worker(),worker(),worker()]);
  artRunning=false;
}

    (m.genres||[]).length?`Themes and genres: ${(m.genres||[]).join(', ')}.`:'',
    `Description: ${(m.overview||'').substring(0,520)}`].filter(Boolean).join(' ');
}
const depthCfg=(d=searchDepth)=>DEPTHS[d]||DEPTHS[DEFAULT_DEPTH];
const depthTarget=(d=searchDepth)=>depthCfg(d).limit;
const depthCandidates=(c,d=searchDepth)=>{const l=depthCfg(d).limit;return Number.isFinite(l)?c.candidates.slice(0,l):c.candidates.slice()};
function statusLine(p){
  const loaded=cache?.movies?.length||cs.movies.length||0;
  const l=depthCfg().limit;
  return `${p} · ${Number.isFinite(l)?Math.min(l,loaded||l):loaded} titles`;
}
const setStatus=t=>{$('#status').textContent=t};
function toast(t){const el=document.createElement('div');el.className='toast';el.textContent=t;document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},1600)}
const show=id=>$$('.plate').forEach(p=>p.classList.toggle('on',p.id===id));

/* ═══════ CORPUS ═══════ */
let genreP=null;
function genreMaps(){
  if(genreP)return genreP;
  genreP=Promise.all([
    fetch(`${TMDB_BASE}/genre/movie/list?api_key=${TMDB_KEY}&language=en-US`).then(r=>r.json()).catch(()=>({genres:[]})),
    fetch(`${TMDB_BASE}/genre/tv/list?api_key=${TMDB_KEY}&language=en-US`).then(r=>r.json()).catch(()=>({genres:[]}))
  ]).then(([a,b])=>{const movie={},tv={};(a.genres||[]).forEach(g=>movie[g.id]=g.name);(b.genres||[]).forEach(g=>tv[g.id]=g.name);return{movie,tv}});
  return genreP;
}
function discover(kind,page){
  const p=new URLSearchParams({api_key:TMDB_KEY,language:'en-US',sort_by:'popularity.desc',page:String(Math.max(1,Math.min(TMDB_MAX_PAGE,page))),with_watch_providers:[NETFLIX_PROVIDER,...NETFLIX_EXTRA].join('|'),watch_region:'US',include_adult:'false'});
  return fetch(`${TMDB_BASE}/discover/${kind}?${p}`).then(r=>{if(!r.ok)throw new Error('tmdb');return r.json()});
}
const toFilm=(s,g)=>(!s.title||!s.poster_path)?null:{title:s.title.trim(),year:String(s.release_date||'').slice(0,4),type:'film',tmdbKind:'movie',genres:(s.genre_ids||[]).map(i=>g[i]).filter(Boolean),posterPath:norm(s.poster_path),backdropPath:norm(s.backdrop_path),overview:`${(s.overview||'').trim()||s.title} Available on Netflix.`,tmdbId:s.id,externalUrl:`https://www.netflix.com/search?q=${encodeURIComponent(s.title)}`};
function toSeries(s,g){
  const t=(s.name||s.original_name||'').trim();
  if(!t||!s.poster_path)return null;
  return {title:t,year:String(s.first_air_date||'').slice(0,4),type:'series',tmdbKind:'tv',genres:(s.genre_ids||[]).map(i=>g[i]).filter(Boolean),posterPath:norm(s.poster_path),backdropPath:norm(s.backdrop_path),overview:`${(s.overview||'').trim()||t} Series available on Netflix.`,tmdbId:s.id,externalUrl:`https://www.netflix.com/search?q=${encodeURIComponent(t)}`};
}
function build(movies){const candidates=movies.map(candidate);const map=new Map();candidates.forEach((c,i)=>map.set(c,movies[i]));cache={movies,candidates,map};return cache}
function ingest(r){
  if(!r?.title)return false;
  const k=`${r.type}:${r.title.toLowerCase()}:${r.year||''}`;
  if(cs.seen.has(k))return false;
  cs.seen.add(k);cs.movies.push(r);return true;
}
function curated(){
  if(cs.curated)return;
  CURATED_NETFLIX_FIELD.forEach(r=>ingest({...r,genres:[...(r.genres||[])],externalUrl:`https://www.netflix.com/search?q=${encodeURIComponent(r.title)}`}));
  cs.curated=true;build(cs.movies);
  resolveAllArt();
}
function ingestPage(d,g,fn){let n=0;(d?.results||[]).forEach(s=>{const r=fn(s,g);if(r&&ingest(r))n++});if(n)build(cs.movies);return n}

async function loadCorpus(target=DEPTHS.surface.limit){
  const want=Number.isFinite(target)?target:Infinity;
  curated();
  if(cache&&(cs.complete||cache.movies.length>=want))return cache;
  while(corpusLock)await corpusLock;
  if(cache&&(cs.complete||cache.movies.length>=want))return cache;
  corpusLock=(async()=>{
    if(!cs.genreMaps)cs.genreMaps=await genreMaps();
    const gm=cs.genreMaps.movie, gt=cs.genreMaps.tv;
    if(!cs.movieTotal){
      const [f,t]=await Promise.all([discover('movie',1),discover('tv',1)]);
      cs.movieTotal=Math.min(TMDB_MAX_PAGE,f.total_pages||1);
      cs.tvTotal=Math.min(TMDB_MAX_PAGE,t.total_pages||1);
      cs.moviePage=2;cs.tvPage=2;
      ingestPage(f,gm,toFilm);ingestPage(t,gt,toSeries);
      paintCover();
    }
    while(!cs.complete&&cs.movies.length<want){
      const jobs=[];
      if(cs.moviePage<=cs.movieTotal){const p=cs.moviePage++;jobs.push(discover('movie',p).then(d=>ingestPage(d,gm,toFilm)).catch(()=>{}))}
      if(cs.tvPage<=cs.tvTotal){const p=cs.tvPage++;jobs.push(discover('tv',p).then(d=>ingestPage(d,gt,toSeries)).catch(()=>{}))}
      if(!jobs.length){cs.complete=true;break}
      await Promise.all(jobs);
      if(!silentLoad)setStatus(statusLine('loading'));
      await new Promise(requestAnimationFrame);
    }
    if(cs.moviePage>cs.movieTotal&&cs.tvPage>cs.tvTotal)cs.complete=true;
    if(!cache)build(cs.movies);
    if(!cache.movies.length)throw new Error('empty corpus');
    paintCover();
    return cache;
  })();
  try{await corpusLock}finally{corpusLock=null}
  return cache;
}

/* ═══════ COVER ═══════ */
let pool=[],ci=0,flip=0,coverTimer=null;
function paintCover(){
  const usable=cs.movies.filter(m=>m.backdropPath);
  if(usable.length<3)return;
  pool=[...usable].sort(()=>Math.random()-.5).slice(0,20);
  if(coverTimer)return;
  swap(pool[0]);
  coverTimer=setInterval(()=>{ci=(ci+1)%pool.length;swap(pool[ci])},8000);
}
function swap(m){
  const a=$('#coverA'),b=$('#coverB');
  const i=flip%2===0?a:b, o=flip%2===0?b:a;
  i.onload=()=>{i.classList.add('on');o.classList.remove('on')};
  i.src=img(m.backdropPath,'w1280');
  flip++;
}

/* ═══════ LEADER ═══════ */
let t0=0,tickTimer=null,ambTimer=null,ambPool=[],ai=0,af=0;
const elapsedStr=()=>((performance.now()-t0)/1000).toFixed(1)+'s';
const setState=t=>{const el=$('#stateText');if(el)el.textContent=t};

function startLeader(q){
  show('leader');
  document.body.classList.remove('locked','launch');
  $('#workQuery').textContent=q;
  setState('measuring the field');
  t0=performance.now();
  clearInterval(tickTimer);
  tickTimer=setInterval(()=>{$('#elapsed').textContent=elapsedStr()},100);
  // slow, calm crossfade through a few stills — never flashing, never frozen
  const pool=cs.movies.filter(m=>m.backdropPath).sort(()=>Math.random()-.5).slice(0,10).map(m=>img(m.backdropPath,'w1280'));
  clearInterval(ambTimer);
  if(pool.length){
    ai=0;af=0;
    const step=()=>{const a=$('#ambA'),b=$('#ambB');const inc=af%2===0?a:b,out=af%2===0?b:a;inc.src=pool[ai%pool.length];inc.classList.add('on');out.classList.remove('on');ai++;af++};
    step();
    ambTimer=setInterval(step,6500);
  }
}
function stopLeader(){clearInterval(tickTimer);clearInterval(ambTimer);document.body.classList.remove('locked','launch')}

/* ═══════ ARBITER ═══════ */
const rows=d=>Array.isArray(d?.all)?d.all:Array.isArray(d?.top)?d.top:Array.isArray(d)?d:[];
const rText=r=>Array.isArray(r)?r[0]:(r?.text??r?.candidate??'');
const rScore=r=>Number(Array.isArray(r)?r[1]:(r?.score??0));
const rIdx=r=>{const v=Array.isArray(r)?r[2]:(r?.index??r?.idx);const n=Number(v);return Number.isInteger(n)&&n>=0?n:null};
function matchRow(r,c){
  const i=rIdx(r);
  if(i!==null&&c.movies[i])return c.movies[i];
  const t=String(rText(r)||'').trim();
  if(!t)return null;
  const d=c.map.get(t);
  if(d)return d;
  const n=t.replace(/\s+/g,' ');
  for(const cand of c.candidates){
    const cn=cand.trim().replace(/\s+/g,' ');
    if(cn===n||cn.startsWith(n)||n.startsWith(cn.slice(0,180)))return c.map.get(cand)||null;
  }
  return null;
}
async function arbiter(payload,attempts=2){
  let last;
  for(let i=0;i<attempts;i++){
    const ctl=new AbortController();
    const to=setTimeout(()=>ctl.abort(),ARBITER_TIMEOUT_MS);
    try{
      const res=await fetch(ARBITER_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json','ngrok-skip-browser-warning':'true'},body:JSON.stringify(payload),signal:ctl.signal});
      const raw=await res.text();
      if(!res.ok)throw new Error('arbiter '+res.status);
      return JSON.parse(raw);
    }catch(e){last=e;if(i<attempts-1){setState('engine timed out · retrying');await pause(800)}}
    finally{clearTimeout(to)}
  }
  throw last;
}
const sliceCorpus=(c,a,b)=>{const movies=c.movies.slice(a,b),candidates=c.candidates.slice(a,b),map=new Map();candidates.forEach((x,i)=>map.set(x,movies[i]));return{movies,candidates,map}};
const mapRows=(rs,c)=>rs.map(r=>{const m=matchRow(r,c);return m?{...m,score:rScore(r)}:null}).filter(Boolean);

async function measure(q,corpus,cands){
  if(!(searchDepth==='archive'&&cands.length>ARCHIVE_BATCH_SIZE)){
    setState(`measuring ${cands.length} titles`);
    const d=await arbiter({query:q,candidates:cands,use_freq:true,top_k:RETURN_COUNT});
    return mapRows(rows(d),corpus).sort((a,b)=>b.score-a.score).slice(0,RETURN_COUNT);
  }
  const total=Math.ceil(cands.length/ARCHIVE_BATCH_SIZE);
  const batches=Array.from({length:total},(_,i)=>[i*ARCHIVE_BATCH_SIZE,Math.min(cands.length,(i+1)*ARCHIVE_BATCH_SIZE)]);
  let cur=0,done=0,ok=0;const merged=[],errs=[];
  setState(`measuring ${cands.length} titles · 0 of ${total} batches`);
  async function worker(){
    while(true){
      const i=cur++;if(i>=batches.length)return;
      const bc=sliceCorpus(corpus,batches[i][0],batches[i][1]);
      try{
        const d=await arbiter({query:q,candidates:bc.candidates,use_freq:true,top_k:RETURN_COUNT});
        merged.push(...mapRows(rows(d),bc));ok++;
      }catch(e){errs.push(e)}
      finally{done++;setState(`measuring ${cands.length} titles · ${done} of ${total} batches`)}
    }
  }
  await Promise.all(Array.from({length:Math.min(ARCHIVE_CONCURRENCY,total)},worker));
  if(!ok||!merged.length)throw errs[0]||new Error('archive returned nothing');
  return merged.sort((a,b)=>b.score-a.score).slice(0,RETURN_COUNT);
}

/* ═══════ SEARCH ═══════ */
async function search(text){
  const q=(text||'').trim();
  if(!q)return;
  currentQuery=q;
  $('#query').value=q;$('#revealQuery').value=q;
  closeProjector();
  startLeader(q);
  try{
    let corpus;
    try{corpus=await loadCorpus(depthTarget())}
    catch(e){console.error(e);setState('the field would not open');await pause(900);toast('field unavailable — reload');show('landing');return}

    const cands=depthCandidates(corpus);
    setState(`measuring ${cands.length} titles`);
    await pause(280);

    try{results=await measure(q,corpus,cands)}
    catch(e){console.error(e);setState('the engine did not answer');await pause(900);toast('engine unreachable');show('landing');return}

    if(!results.length){setState('nothing came close');await pause(1000);show('landing');return}

    active=0;
    render();
    // preload the hero so the reveal appears fully formed, then cross-fade
    const first=results[0];
    const heroArt=isSquare(first)?first.imageUrl:backdrop(first,'original');
    await new Promise(res=>{if(!heroArt)return res();const im=new Image();im.onload=res;im.onerror=res;im.src=heroArt;setTimeout(res,1200)});
    $('#reveal').classList.add('on');
    requestAnimationFrame(()=>autoResize($('#revealQuery')));
    await pause(480);
    $('#landing').classList.remove('on');
    $('#leader').classList.remove('on');
    history.replaceState(null,'','#'+encodeURIComponent(q));
  }finally{stopLeader()}
}

/* ═══════ REVEAL ═══════ */
const trailerCache=new Map();
async function fetchTrailer(m){
  if(!m?.tmdbId)return null;
  const key=`${m.tmdbKind}:${m.tmdbId}`;
  if(trailerCache.has(key))return trailerCache.get(key);
  try{
    const d=await fetch(`${TMDB_BASE}/${m.tmdbKind==='tv'?'tv':'movie'}/${m.tmdbId}/videos?api_key=${TMDB_KEY}&language=en-US`).then(r=>r.json());
    const scored=(d.results||[]).filter(v=>v.site==='YouTube'&&v.key).map(v=>{
      const n=(v.name||'').toLowerCase();let s=0;
      if(v.type==='Trailer')s+=10;if(v.type==='Teaser')s+=4;if(v.official)s+=4;
      if(n.includes('official trailer'))s+=5;else if(n.includes('trailer'))s+=3;
      return{v,s};
    }).sort((a,b)=>b.s-a.s);
    const pick=scored[0]?.v||null;
    trailerCache.set(key,pick);return pick;
  }catch(e){return null}
}
const embed=v=>v?.key?`https://www.youtube-nocookie.com/embed/${encodeURIComponent(v.key)}?autoplay=1&controls=1&rel=0&modestbranding=1&playsinline=1`:'';
let reqId=0;
function closeProjector(){
  reqId++;$('#projFrame').src='';
  const p=$('#projector');p.classList.remove('show');p.setAttribute('aria-hidden','true');
  document.body.classList.remove('playing');
}
async function openProjector(){
  const m=results[active];
  if(!m?.tmdbId){toast('no trailer for this format');return}
  const id=++reqId, p=$('#projector'), btn=$('#play');
  btn.textContent='loading trailer';
  const v=await fetchTrailer(m);
  btn.textContent='watch trailer';
  if(id!==reqId)return;
  if(!v){toast('no trailer on file');return}
  $('#projQ').textContent=currentQuery;
  $('#projFrame').src=embed(v);
  p.classList.add('show');p.setAttribute('aria-hidden','false');
  document.body.classList.add('playing');
  setTimeout(()=>p.classList.remove('show'),1600);
}

function render(){
  const m=results[active];
  if(!m)return;
  const square=isSquare(m);
  const art=backdrop(m,'original');

  $('#revealCanvas').classList.toggle('square',square);
  $('#stillBg').src=art;
  $('#still').src=art;$('#still').alt=m.title;
  $('#cardImg').src=square?m.imageUrl:art;
  $('#cardImg').alt=m.title;

  $('#title').textContent=m.title;
  $('#format').textContent=fmt(m);
  $('#score').textContent=Number(m.score).toFixed(3);
  $('#meta').innerHTML=[m.year,m.publisher,m.availability,...(m.genres||[]).slice(0,2)].filter(Boolean).map(x=>`<span>${esc(x)}</span>`).join('');
  const ov=(m.overview||'').trim();
  $('#synopsis').textContent=ov.length>280?ov.slice(0,279).trimEnd()+'…':ov;

  $('#pos').textContent=String(active+1).padStart(2,'0');
  $('#total').textContent=String(results.length).padStart(2,'0');
  $('#deckCount').textContent=`${new Set(results.map(r=>r.type)).size} formats`;

  $('#play').disabled=!m.tmdbId;
  $('#play').textContent=m.tmdbId?'watch trailer':'no trailer';
  $('#watch').textContent=m.type==='game'?'play on netflix ↗':'open on netflix ↗';
  $('#watch').onclick=()=>window.open(m.externalUrl||`https://www.netflix.com/search?q=${encodeURIComponent(m.title)}`,'_blank');
  $('#copy').onclick=()=>navigator.clipboard?.writeText(location.href.split('#')[0]+'#'+encodeURIComponent(currentQuery)).then(()=>toast('link copied'));

  renderDeck();
  autoResize($('#revealQuery'));
}
function renderDeck(){
  $('#deck').innerHTML=results.map((r,i)=>`
    <button type="button" class="tile ${i===active?'on':''}" data-i="${i}" aria-current="${i===active}">
      <span class="shot"><img src="${poster(r,'w342')}" alt="" loading="lazy" decoding="async"><span class="n">${String(i+1).padStart(2,'0')}</span></span>
      <span class="cap">${esc(r.title)}</span>
      <span class="sc">${Number(r.score).toFixed(3)}</span>
    </button>`).join('');
  $$('.tile').forEach(t=>t.onclick=()=>{active=+t.dataset.i;closeProjector();render()});
  const on=$('.tile.on');
  if(on)on.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}
function step(d,{play=false}={}){
  if(!results.length)return;
  active=(active+d+results.length)%results.length;
  closeProjector();
  render();
  if(play)openProjector();
}

/* ═══════ INPUT ═══════ */
function autoResize(el){
  if(!el)return;
  if(el.offsetParent===null&&el.offsetHeight===0)return; // hidden plate: keep CSS height, don't zero it
  el.style.height='auto';
  const max=parseFloat(getComputedStyle(el).maxHeight)||Infinity;
  el.style.height=Math.min(max,el.scrollHeight)+'px';
}
function bindInput(el,fn){
  el.addEventListener('input',()=>autoResize(el));
  el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();fn()}});
}
bindInput($('#query'),()=>search($('#query').value));
bindInput($('#revealQuery'),()=>search($('#revealQuery').value));
$('#searchForm').addEventListener('submit',e=>{e.preventDefault();search($('#query').value)});
$('#revealForm').addEventListener('submit',e=>{e.preventDefault();search($('#revealQuery').value)});

$('#home').onclick=()=>{closeProjector();show('landing');history.replaceState(null,'',location.pathname);$('#query').focus()};
$('#prev').onclick=()=>step(-1);
$('#next').onclick=()=>step(1);
$('#play').onclick=()=>openProjector();
$('#projClose').onclick=closeProjector;
$('#projPrev').onclick=()=>step(-1,{play:true});
$('#projNext').onclick=()=>step(1,{play:true});
$('#projector').addEventListener('mousemove',()=>{const p=$('#projector');p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),1500)});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeProjector();
  if(!results.length||document.activeElement.tagName==='TEXTAREA')return;
  if(!$('#reveal').classList.contains('on')&&!document.body.classList.contains('playing'))return;
  if(e.key==='ArrowRight')step(1);
  if(e.key==='ArrowLeft')step(-1);
});

$$('.depth button').forEach(b=>b.onclick=async()=>{
  searchDepth=b.dataset.depth;
  $$('.depth button').forEach(x=>x.classList.toggle('on',x===b));
  const target=depthTarget();
  const loaded=cache?.movies?.length||cs.movies.length||0;
  const needs=Number.isFinite(target)?loaded<target:!cs.complete;
  if(needs)b.classList.add('loading');
  setStatus(statusLine('loading'));
  try{await loadCorpus(target);setStatus(statusLine('ready'))}
  catch(e){setStatus('field unavailable')}
  finally{b.classList.remove('loading')}
});

/* auto-typed example queries cycle through the input placeholder */
let twTimer=null,twI=0,twC=0,twDel=false;
function twTick(){
  const el=$('#query');
  if(!el||!$('#landing').classList.contains('on')||document.activeElement===el||el.value.trim()){twTimer=setTimeout(twTick,700);return}
  const phrase=EXAMPLES[twI%EXAMPLES.length].q;
  if(!twDel){
    twC++;el.setAttribute('placeholder',phrase.slice(0,twC));
    if(twC>=phrase.length){twDel=true;twTimer=setTimeout(twTick,2000);return}
    twTimer=setTimeout(twTick,34+Math.random()*40);return;
  }
  twC--;el.setAttribute('placeholder',phrase.slice(0,Math.max(0,twC)));
  if(twC<=0){twDel=false;twI=(twI+1)%EXAMPLES.length;twTimer=setTimeout(twTick,380);return}
  twTimer=setTimeout(twTick,16+Math.random()*18);
}
function startTW(){clearTimeout(twTimer);twC=0;twDel=false;twTimer=setTimeout(twTick,300)}
$('#query').addEventListener('focus',()=>{clearTimeout(twTimer);$('#query').setAttribute('placeholder','Describe it in your own words')});
$('#query').addEventListener('blur',()=>{if(!$('#query').value.trim())startTW()});
startTW();

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function voice(btnSel,targetSel){
  const btn=$(btnSel),t=$(targetSel);
  if(!SR){btn.hidden=true;return}
  btn.onclick=()=>{
    const rec=new SR();rec.lang='en-US';rec.interimResults=true;
    btn.classList.add('listening');
    let final='';
    rec.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){const x=e.results[i][0].transcript;e.results[i].isFinal?final+=x:interim+=x}
      const s=(final||interim).trim();
      if(s){t.value=s;autoResize(t)}
    };
    rec.onend=rec.onerror=()=>btn.classList.remove('listening');
    rec.start();
  };
}
voice('#voiceBtn','#query');
voice('#revealVoiceBtn','#revealQuery');

/* ═══════ INIT ═══════ */
(async()=>{
  try{
    setStatus(statusLine('loading'));
    await loadCorpus(depthTarget(DEFAULT_DEPTH));
    setStatus(statusLine('ready'));
    const h=decodeURIComponent(location.hash.replace(/^#/,''));
    if(h)search(h);
    // pre-warm deeper + everything so switching tiers is instant
    const idle=window.requestIdleCallback||(fn=>setTimeout(()=>fn(),1400));
    idle(async()=>{
      silentLoad=true;
      try{await loadCorpus(depthTarget('field'));await loadCorpus(depthTarget('archive'))}
      catch(e){}
      finally{silentLoad=false;setStatus(statusLine('ready'))}
    });
  }catch(e){console.error(e);setStatus('field unavailable — reload')}
})();
